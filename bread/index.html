<style>
* {margin: 0; padding: 0; box-sizing: border-box; }

html, body { width: 100%;
background: #e5e5e5;
}

[hidden] {
display: none !important;
}

.container {
display: flex;
flex-direction: column;
align-items: center;
background: none;
}

.container > * {
width: 100%;
max-width: 1400px;
height: auto;
display: block;
opacity: 1;
}

.container img {
width:100%;
max-width: 1400px;
height:auto;
display:block;
background:none;
pointer-events:none;
transition: none;
opacity:1;
}

#firstImage {
opacity: 0;
}

#firstImage.open {
opacity: 1;
transition: opacity 2s ease;
}

#mainContainer {
/* Интерполяция между 1600 и 2000 */
margin: 0 clamp(5vw, calc(-35vw + 800px), 15vw);
}

/* 10 кадров 128x1280px  */
/* 11 это копия 1 кадра, но в изображении по сообрежениям он удалён*/
#loadSprite {
  display: block; margin: 0 auto;
  width: 64px; height: 64px;
  
  /* Картинку переносим в маску */
  -webkit-mask-image: url("/content/load_sprite.png");
  mask-image: url("/content/load_sprite.png");
  -webkit-mask-size: 64px 640px;
  mask-size: 64px 640px;
  
  background-color: #f5bd49; /* ЛЮБОЙ ЦВЕТ ЗДЕСЬ */
  animation: playMask 0.8s steps(10) infinite;
}

@keyframes playMask {
  from { -webkit-mask-position: 0 0; mask-position: 0 0; }
  to { -webkit-mask-position: 0 -640px; mask-position: 0 -640px; }
}

<div id="mainContainer" class="container" >
  <img id="firstImage" src="/files/bread/b_1_lq.png" >
</div>

<div id="loadSprite" hidden></div>

<script>

const firstImg = document.getElementById('firstImage');
const mainContainer = document.getElementById('mainContainer');
const loader = document.getElementById('loadSprite'); // loaderGif

const ua = navigator.userAgent.toLowerCase();
const isMobile = /iphone|ipad|android/.test(ua);

let isInitialized = false;

if(isMobile) mainContainer.style.margin = "0vw";

function showFirstImage() {
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      console.log("showFirstImage")
      firstImg.classList.add('open');
    });
  });
}

function hideFirstImage() {
  firstImg.classList.remove('open');
}

window.addEventListener("pagehide", hideFirstImage);

window.addEventListener("pageshow", (event) => {
  if (event.persisted) {
    window.scrollTo(0, 0);
    showFirstImage();
  }
});

const images = [
  {type: "spacer", w: 2800, h: 2207},
  {src: "/files/bread/b_3_hq.png", w: 2800, h: 6636},
  {src: "/files/bread/b_4_hq.png", w: 870,  h: 406},
  {type: "spacer", w: 2800, h: 1400},
];

async function loadFirstImageWithRetries(imgEl, maxRetries = 5, delay = 1000) {
  // 1. грузим LQ (она в 8 раз легче)
  imgEl.src = "/files/bread/b_1_lq.png";

  let attempts = 0;
  let loaded = false;

  while (attempts < maxRetries) {
    if (imgEl.complete && imgEl.naturalHeight !== 0) {
      loaded = true;
      break;
    }
    try {
      await new Promise((res, rej) => {
        imgEl.onload = res;
        imgEl.onerror = rej;
      });
      loaded = true;
      break;
    } catch {
      attempts++;
      await new Promise(r => setTimeout(r, delay));
    }
  }

  if (loaded) {
    // 2. Если это ПК, меняем на HQ
    if (!isMobile) {
      const hqImg = new Image(); //  невидимый элемент в памяти
      hqImg.src = "/files/bread/b_1_hq.png";
      
      hqImg.onload = () => {
        imgEl.src = hqImg.src; 
        console.log("HQ подгружено");
      };
    }
    return imgEl;
  }
  return null;
}

// функция для загрузки изображения с повторными попытками
function loadImage(src, maxRetries = 5, delay = 1000) {
  return new Promise((resolve, reject) => {
    let attempts = 0;

    function tryLoad() {
      const img = document.createElement("img");
      img.src = src;
      img.onload = () => resolve(img);
      img.onerror = () => {
        attempts++;
        console.warn(`Ошибка загрузки: ${src}, попытка ${attempts}`);
        if (attempts < maxRetries) {
          setTimeout(tryLoad, delay); // пробуем снова через задержку
        } else {
          reject(new Error(`Не удалось загрузить ${src} после ${maxRetries} попыток`));
        }
      };
    }

    tryLoad();
  });
}

async function loadSequentially(list) { 
  for (const item of list) {
    try {
      let element;

      if (item.type === "spacer") {
        element = document.createElement("div");
        element.style.backgroundColor = "#f5bd49";
      } else {
        element = await loadImage(item.src);
      }
      
      element.style.aspectRatio = `${item.w} / ${item.h}`;

      mainContainer.appendChild(element);
    } catch (e) {
      console.error(e);
      break;
    }
  }

  if(loader) loader.hidden = true; 
  
}

function aClassToFtImage(){
    void firstImg.offsetHeight

    if ( !firstImg.classList.contains('open') ) { 
      firstImg.classList.add('open');
      console.log("aClassToFtImage - add Class");
    }else{
      console.log("aClassToFtImage - class already adding");
    }
}

function initPage() {

  loadFirstImageWithRetries(firstImg).then((firstLoaded) => {
    if (firstLoaded) {
      
      //console.log("первая загружена");
      aClassToFtImage();

      if(loader) loader.hidden = false; 
      loadSequentially(images);

    }
  }).catch(err => {
    console.error("Ошибка загрузки:", err);
    if(loader) loader.hidden = true;
  });


  document.addEventListener("keydown", onKeyCommand);

  window.addEventListener('focus', () => { console.log("Фокус вернулся");
  });
}

function onKeyCommand(e) {
  console.log("Press", e.code);
  
  if (e.code === "Escape"){ // ESC
    e.preventDefault();
    e.stopImmediatePropagation(); // Чтобы другие скрипты не мешали

    if (window.location.protocol === "file:") {
      window.location.href = "./index.html";
    } else {
      //window.history.back();
      window.location.href = "https://vsky.space";
    }
  }
  return
}

// Init Block
initPage();


</script>
