<div id="loader" class="loading_container" >
  <img src="/content/loading.gif">
</div>

<script>
 
// script proto for 1400 fix

const images = [
  {src: "/files/bread/b_2.png", w: 2800, h: 2207},
  {src: "/files/bread/b_3.png", w: 2800, h: 6636},
  {src: "/files/bread/b_4.png", w: 870,  h: 406},
];

const container = document.getElementById("mainContainer");
const firstImg = document.querySelector('#mainContainer img');
const loader = document.getElementById("loader");

const ua = navigator.userAgent.toLowerCase();
const isMobile = /iphone|ipad|android/.test(ua);

if(isMobile){
  container.style.padding = "0vw";
}

async function loadFirstImageWithRetries(imgEl, maxRetries = 5, delay = 1000) {
  let attempts = 0;

  while (attempts < maxRetries) {
    // Если картинка уже полностью загружена
    if (imgEl.complete && imgEl.naturalHeight !== 0) {
      imgEl.style.opacity = 1; // показываем
      return imgEl;
    }

    try {
      await new Promise((resolve, reject) => {
        imgEl.onload = () => resolve();
        imgEl.onerror = () => reject();
      });

      imgEl.style.opacity = 1;
      return imgEl;

    } catch {
      attempts++;
      console.warn(`Ошибка загрузки первой картинки, попытка ${attempts}`);
      await new Promise(r => setTimeout(r, delay));
    }
  }

  console.error("Не удалось загрузить первую картинку после всех попыток");
  return null;
}


// функция для загрузки одной картинки с повторной попыткой
function loadImage(src, maxRetries = 5, delay = 1000) {
  return new Promise((resolve, reject) => {
    let attempts = 0;

    function tryLoad() {
      const img = document.createElement("img");
      img.src = src;
      img.onload = () => resolve(img);
      img.onerror = () => {
        attempts++;
        console.warn(`Ошибка загрузки: ${src}, попытка ${attempts}`);
        if (attempts < maxRetries) {
          setTimeout(tryLoad, delay); // пробуем снова через задержку
        } else {
          reject(new Error(`Не удалось загрузить ${src} после ${maxRetries} попыток`));
        }
      };
    }

    tryLoad();
  });
}

async function loadSequentially(list) {
  const TARGET_WIDTH = 1400; // Целевая ширина

  for (const item of list) {
    try {
      const img = await loadImage(item.src);
      
      // Вычисляем коэффициент масштабирования относительно 1400px
      const scaleFactor = TARGET_WIDTH / item.w;
      
      // Устанавливаем ширину ровно 1400
      img.width = TARGET_WIDTH;
      img.height = item.h * scaleFactor;

      img.style.width = TARGET_WIDTH + "px";
      img.style.height = "auto"; 
      
      img.style.opacity = 1;
      container.appendChild(img);
    } catch (e) {
      console.error(e);
      break;
    }
  }
  loader.style.display = "none";
}

// Используем перед загрузкой последовательного списка
loadFirstImageWithRetries(firstImg).then(() => loadSequentially(images));


function onKeyCommand(e) {

  console.log("Press", e.code);
  
  if (e.code === "Escape"){ // ESC
    e.preventDefault();
    e.stopImmediatePropagation(); // Чтобы другие скрипты не мешали

    if (window.location.protocol === "file:") {
      window.location.href = "./index.html";
    } else {
      //window.history.back();
      window.location.href = "https://vsky.space";
    }
  }

  return
}

document.addEventListener("keydown", onKeyCommand);

window.addEventListener('focus', () => {
    console.log("Фокус вернулся");
});

</script>
