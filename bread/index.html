<script>
 
const images = [
  {type: "color", color: "#f5bd49", w: 2800, h: 2207},
  {src: "/files/bread/b_3.png", w: 2800, h: 6636},
  {src: "/files/bread/b_4.png", w: 870,  h: 406},
  {type: "color", color: "#f5bd49", w: 2800, h: 2207},
];

const mainContainer = document.getElementById('mainContainer');
const firstImg = document.getElementById('firstImage');
const loaderIcon = document.getElementById('loaderIcon');

const ua = navigator.userAgent.toLowerCase();
const isMobile = /iphone|ipad|android/.test(ua);

if(isMobile){
  mainContainer.style.padding = "0vw";
}

async function loadFirstImageWithRetries(imgEl, maxRetries = 5, delay = 1000) {
  let attempts = 0;

  while (attempts < maxRetries) {
    // Если картинка уже полностью загружена
    if (imgEl.complete && imgEl.naturalHeight !== 0) {

      //imgEl.style.opacity = 1;
      imgEl.classList.add('open');
      
      return imgEl;
    }

    try {
      await new Promise((resolve, reject) => {
        imgEl.onload = () => resolve();
        imgEl.onerror = () => reject();
      });

      //imgEl.style.opacity = 1;
      imgEl.classList.add('open');
      return imgEl;

    } catch {
      attempts++;
      console.warn(`Ошибка загрузки первой картинки, попытка ${attempts}`);
      await new Promise(r => setTimeout(r, delay));
    }
  }

  console.error("Не удалось загрузить первую картинку после всех попыток");
  return null;
}


// функция для загрузки одной картинки с повторной попыткой
function loadImage(src, maxRetries = 5, delay = 1000) {
  return new Promise((resolve, reject) => {
    let attempts = 0;

    function tryLoad() {
      const img = document.createElement("img");
      img.src = src;
      img.onload = () => resolve(img);
      img.onerror = () => {
        attempts++;
        console.warn(`Ошибка загрузки: ${src}, попытка ${attempts}`);
        if (attempts < maxRetries) {
          setTimeout(tryLoad, delay); // пробуем снова через задержку
        } else {
          reject(new Error(`Не удалось загрузить ${src} после ${maxRetries} попыток`));
        }
      };
    }

    tryLoad();
  });
}

async function loadSequentiallyOld(list) {
  const TARGET_WIDTH = 1400; 

  for (const item of list) {
    try {
      const img = await loadImage(item.src);
      
      // 1. Оставляем атрибуты для "подсказки" браузеру о пропорциях
      const scaleFactor = TARGET_WIDTH / item.w;
      img.width = TARGET_WIDTH;
      img.height = item.h * scaleFactor;

      img.style.width = "100%";
      img.style.maxWidth = "1400px"; // Это позволит им сжиматься при ресайзе
      img.style.height = "auto"; 
      
      img.style.opacity = 1;
      mainContainer.appendChild(img);
    } catch (e) {
      console.error(e);
      break;
    }
  }

  loaderIcon.style.display = "none";
}

async function loadSequentially(list) {
  const TARGET_WIDTH = 1400; 

  for (const item of list) {
    try {
      let element;
      const scaleFactor = TARGET_WIDTH / item.w;
      const calculatedHeight = item.h * scaleFactor;

      if (item.type === "color") {
        // Создаем цветной блок
        element = document.createElement("div");
        element.style.backgroundColor = item.color;
      } else {
        // Загружаем картинку
        element = await loadImage(item.src);
      }
      
      // Общие стили для сохранения пропорций
      element.style.width = "100%";
      element.style.maxWidth = `${TARGET_WIDTH}px`;
      element.style.height = `${calculatedHeight}px`; // Фиксируем высоту для пропорции
      element.style.opacity = 1;
      element.style.display = "block";

      mainContainer.appendChild(element);
    } catch (e) {
      console.error(e);
      break;
    }
  }
  loaderIcon.style.display = "none"; // Исправлено имя переменной
}

function initPage() {

  loadFirstImageWithRetries(firstImg).then(() => loadSequentially(images));

  document.addEventListener("keydown", onKeyCommand);

  window.addEventListener('focus', () => { console.log("Фокус вернулся");
  });
}

function onKeyCommand(e) {
  console.log("Press", e.code);
  
  if (e.code === "Escape"){ // ESC
    e.preventDefault();
    e.stopImmediatePropagation(); // Чтобы другие скрипты не мешали

    if (window.location.protocol === "file:") {
      window.location.href = "./index.html";
    } else {
      //window.history.back();
      window.location.href = "https://vsky.space";
    }
  }
  return
}


// Init Block
initPage();

</script>
