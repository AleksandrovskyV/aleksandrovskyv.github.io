<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html, body {
    height: 100%;
    background: #e5e5e5;
    transition: background-color 0.8s ease;
  }
  body.invert{background: #000;}

  /* 1. КОНТЕЙНЕРЫ (Геометрия) */
  .overlay, .overlayMobile {
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:1000;
  }
  .overlayMobile { top: env(safe-area-inset-top, 0); bottom: env(safe-area-inset-bottom, 0); }

  .buttonblock, .buttonblockMobile {
    display:flex; flex-wrap:wrap; gap:16px; justify-content: space-between; background:transparent;
  }
  .buttonblock { width: min(90vw, 700px); height: min(90vh, 680px); align-content:center; padding:20px; }
  .buttonblockMobile { padding: env(safe-area-inset-top, 12px) env(safe-area-inset-right, 12px) env(safe-area-inset-bottom, 12px) env(safe-area-inset-left, 12px); }

  /* 2. БАЗОВАЯ КНОПКА (Объединяем только фундамент) */
  .buttonblock button, .buttonblockMobile button {
    flex: 0 0 auto; display:inline-flex; align-items:center; justify-content:center;
    padding:12px; font-size:1.25rem; color: gray; border: 0; cursor:pointer;
    transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color .6s ease;
    will-change: opacity, transform; z-index: 99; user-select: none; background: transparent;
  }

  .buttonblock button[data-st="lock"], .buttonblockMobile button[data-st="lock"] { color: rgba(70,70,70,1.0); }

  /* 3. ЭФФЕКТЫ ПК */
  @media (hover: hover) {
    .buttonblock button:not([data-st="lock"]):hover, .buttonblockMobile button:not([data-st="lock"]):hover { opacity: .5; }
    .buttonblock button[data-st="lock"], .buttonblockMobile button[data-st="lock"] { cursor: grab; }
    .buttonblock button[data-st="lock"]:active, .buttonblockMobile button[data-st="lock"]:active {
      cursor: grabbing; transform: scale(0.99); color: rgba(50,50,50,1.0); 
    }
  }

  /* 4. ЗОНЫ (BD, BW, BB) */
  .buttonblock button.bd, .buttonblockMobile button.bd,
  .buttonblock button.bw, .buttonblockMobile button.bw,
  .buttonblock button.bb, .buttonblockMobile button.bb {
    cursor: default; pointer-events: none;
  }

  /* Цвета покоя */
  .buttonblock button.bd, .buttonblockMobile button.bd { color: rgba(128, 128, 128, 0); }
  .buttonblock button.bb, .buttonblockMobile button.bb,
  .buttonblock button.bw, .buttonblockMobile button.bw { color: #9b9b9b; }

  /* СТРОГО ПО ИСХОДНИКУ: у BB только цвет, у остальных — всё */
  .buttonblock button.bb, .buttonblockMobile button.bb { transition: color 0.6s ease; }

  .buttonblock button.bw:not([data-st="lock"]), 
  .buttonblockMobile button.bw:not([data-st="lock"]) {
    pointer-events: auto; cursor: pointer; 
  }

  /* АКТИВНЫЕ СОСТОЯНИЯ */
  .buttonblock button.bd.dOpen, .buttonblockMobile button.bd.dOpen {
    pointer-events: auto; cursor: pointer; color: rgba(128, 128, 128, 1);
    /* Здесь 0.9s для цвета, как ты настраивал */
    transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color 1.6s ;
  }

  .buttonblock button.bw.wLock, .buttonblockMobile button.bw.wLock,
  .buttonblock button.bb.bLock, .buttonblockMobile button.bb.bLock {
    pointer-events: auto; cursor: grab; color: rgba(70,70,70,1.0);
  }

  .buttonblock button.bw.wLock:active, .buttonblockMobile button.bw.wLock:active,
  .buttonblock button.bb.bLock:active, .buttonblockMobile button.bb.bLock:active {
    cursor: grabbing; transform: scale(0.99); color: rgba(50,50,50,1.0); 
  }

  /* 5. HEART SPRITE */
  .heart-sprite {
    display: block; margin: 0 auto; width: 88px; height: 42px; margin-top: 5px;
    background-image: url("/content/heart_sprite.png"); background-repeat: no-repeat;
    background-size: 100% auto; background-position: 0 0;
    transition: background-position 0.4s steps(19); will-change: background-position;
  }
  .heart-sprite.is-full { background-position: 0 100%; }

  .hidden-btn { opacity: 0 !important; pointer-events: none !important; }

  @media (max-width:420px){
    .buttonblock, .buttonblockMobile { gap:10px; padding:12px; }
    .buttonblock button, .buttonblockMobile button { padding:10px 14px; font-size:1rem; }
  }

<body>
<img src="/content/heart_sprite.png" style="display:none" alt="" decoding="async">

<div class="overlay" id="mOverlay">
  <div class="buttonblock" id="mButtonsContainer"> 

    <!-- g=group ; mb=mobile ; mh=mobilehidden-->

    <button id="firstBtn" data-g="W" data-st="open" data-mb="false"  data-href="/wolume"   class="bw" >~</button>

    <!-- mobile special -->
    <button id="bbtn"     data-g="D" data-st="open" data-mb="true"  data-href="/chat"     class="bd" >chat___</button>
    <button id="cbtn"     data-g="D" data-st="open" data-mb="true"  data-href="/день"     class="bd" >день</button>
    <button id="dbtn"     data-g="D" data-st="open" data-mb="true"  data-href="/триптих"  class="bd" >триптих</button>

    <!-- disable on mobile -->
    <button id="pbtn"     data-g="D" data-st="open" data-mb="false" data-href="/fe"       class="bd" data-mh="true" >fe</button>
    <button id="qbtn"     data-g="D" data-st="open" data-mb="false" data-href="/flipbook" class="bd" data-mh="true" >flipbook</button>


    <!-- combine between web and mobile  -->
    <button id="ebtn"     data-g="D" data-st="open" data-mb="false" data-href="/негативы" class="bd" >негативы</button>
    <button id="fbtn"     data-g="D" data-st="open" data-mb="false" data-href="/exegesis" class="bd" >.exe</button>

    <button id="gbtn"     data-g="W" data-st="lock" data-mb="false" data-href="/renders"  class="bw" >_enders</button>
    <button id="hbtn"     data-g="W" data-st="lock" data-mb="false" data-href="/снимки"   class="bw" >снимки</button>
    <button id="ibtn"     data-g="W" data-st="lock" data-mb="false" data-href="/графика"  class="bw" >графика</button>
  
    <button id="jbtn"     data-g="W" data-st="open" data-mb="false" data-href="/bread"    class="bw" >bread</button>
    <button id="kbtn"     data-g="W" data-st="lock" data-mb="false" data-href="/haloguys" class="bw" >[ haloguys ]</button>
    <button id="lbtn"     data-g="W" data-st="lock" data-mb="false" data-href="/покпокки" class="bw" >покпокки</button>
  
    <button id="mbtn"     data-g="W" data-st="lock" data-mb="false" data-href="/работа"   class="bw" >работа</button>
    <button id="nbtn"     data-g="W" data-st="lock" data-mb="false" data-href="/process"  class="bw" >_cess</button>

    <button id="obtn"     data-g="B" data-st="lock" data-mb="false" data-href="/const"    class="bb" >/</button>

    <!-- end block -->
    <button id="preBtn"   data-g="B" data-st="lock" data-mb="false" data-href="/space"    class="bb" >—</button>

     <!-- логика с гиф была полностью убрана, так как заставить её работать без перезагрузки в Safari никак   -->
    <button id="lastBtn"  data-st="open" data-href="/about" >
        <div id="heartIcon" class="heart-sprite"></div>
    </button>

  </div>
</div>

<script>

const debugMode = false
const ua = navigator.userAgent.toLowerCase();
const isMobile = /iphone|ipad|android/.test(ua);

const overlay = document.getElementById('mOverlay');
const buttonContainer = document.getElementById('mButtonsContainer');
const buttons = Array.from(buttonContainer.querySelectorAll('button'));

if (isMobile) {
  overlay.classList.replace('overlay', 'overlayMobile');
  buttonContainer.classList.replace('buttonblock', 'buttonblockMobile');
}
  
// ВОССТАНОВЛЕНИЕ ПОСЛЕ ВОЗВРАТА НАЗАД
window.addEventListener("pageshow", (event) => {
  if (event.persisted) {
    // только восстанавливаем видимость скрытых кнопок
    buttons.forEach(btn => {
      if(btn.classList.contains('hidden-btn')){
        btn.classList.remove('hidden-btn');
        btn.style.visibility = 'visible';
      }
    });
    buttonContainer.style.pointerEvents = "";
  }
});

function debugOffsets() {
  const btns = document.getElementById('mButtonsContainer').children;
  if (btns.length < 2) return console.log("Недостаточно кнопок");

  const last = btns[btns.length - 1];
  const preLast = btns[btns.length - 2];

  console.log({
    last: {
      tag: last.dataset.href || 'no-href',
      offset: last.offsetTop,
      height: last.offsetHeight
    },
    preLast: {
      tag: preLast.dataset.href || 'no-href',
      offset: preLast.offsetTop,
      height: preLast.offsetHeight
    },
    diff: Math.abs(last.offsetTop - preLast.offsetTop)
  });
}

/* ========== подстройка размера шрифта в зависимости от кол-ва кнопок ==========
   простая эвристика: чем больше кнопок — тем меньше шрифт (можно настроить под себя).
*/

function adjustFontByCount(){
  const n = buttons.length;

  //web - 4.6 
  const base = isMobile ? 4.4 : 4.6;
  const sizeRem = Math.max(0.9, base - (n - 3) * 0.12);
  buttons.forEach(b => b.style.fontSize = sizeRem + 'rem');
};

function removeDeskBtnOnMobile() {
  if (!isMobile) return;

  const container = document.getElementById('mButtonsContainer');
  const btnsToRemove = container.querySelectorAll('button[data-mh="true"]');

  btnsToRemove.forEach(btn => {
    btn.remove();
  });
}

function removeOverflowLockBtns() {
  // удаление lock кнопок для мобильной

  const container = buttonContainer;
  const maxHeight = overlay.clientHeight;

  // Пока контент не помещается
  while (container.scrollHeight > maxHeight) {

    // Берём все кнопки lock, кроме исключений
    const lockButtons = Array.from(container.querySelectorAll('button[data-st="lock"]'))
      .filter(btn => btn.id !== 'firstBtn' && btn.id !== 'preBtn' && btn.id !== 'lastBtn');

    if (lockButtons.length === 0) break; // Больше нечего удалять

    // Удаляем последнюю подходящую кнопку
    const btnToRemove = lockButtons.pop();
    container.removeChild(btnToRemove);
  }
}

function hideAllButtons() {
  return new Promise(resolve => {
    let finished = 0;
    const total = buttons.length;

    function onTransitionEnd(e) {
      if (e.propertyName !== 'opacity') return;
      finished++;
      if (finished >= total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }

    function cleanup(){
      buttons.forEach(btn => btn.removeEventListener('transitionend', onTransitionEnd));
    }

    // привязываем слушатель И запускаем анимацию скрытия
    buttons.forEach(btn => btn.addEventListener('transitionend', onTransitionEnd));
    // небольшая задержка, чтобы гарантировано применился класс и началась анимация
    requestAnimationFrame(() => {
      buttons.forEach(btn => btn.classList.add('hidden-btn'));
    });

    // safety fallback — если transitionend не сработает, через 1.2s всё равно продолжим
    setTimeout(() => {
      if (finished < total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }, 1400);
  });
}

function getLastRowInfo() {
  const btns = Array.from(buttonContainer.children);
  if (!btns.length) return 0;

  //debugOffsets();

  const lastTop = btns[btns.length - 1].offsetTop;
  const lastRowBtns = btns.filter(btn => btn.offsetTop === lastTop);

  console.log(`На последней строке: ${lastRowBtns.length}`);
  return lastRowBtns.length;
}

function checkLastRow() {
  // Максимум 3 попытки, чтобы не уйти в бесконечность
  for (let i = 0; i < 3; i++) {
    const n = getLastRowInfo();
    
    // Если в хвосте 1 или 2 кнопки — чистим
    if (n > 0 && n <= 2) {
      const lockButtons = Array.from(buttonContainer.querySelectorAll('button[data-st="lock"]'))
        .filter(btn => btn.id !== 'preBtn' && btn.id !== 'lastBtn');

      if (lockButtons.length === 0) break;

      lockButtons[lockButtons.length - 1].remove();
    } else {
      break;
    }
  }
}

function shuffleButtonsWithRules() {
  const container = buttonContainer;

  // слишком мало кнопок для перемешивания
  if (buttons.length <= 3) return; 

  // находим фиксированные 
  const firstBtn =  document.getElementById('firstBtn');
  const preBtn = document.getElementById('preBtn'); 
  const lastBtn = document.getElementById('lastBtn');

  // кнопки, которые нельзя ставить последними перед фиксированными
  const excl = buttons.filter(b => b.dataset.href === "/const"); // b.dataset.href === "/wolume" || 

  // остальные кнопки
  const rest = buttons.filter(b => ![firstBtn, lastBtn, preBtn].includes(b));

  // функция перемешивания Fisher–Yates
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  // перемешиваем, пока последний элемент локального массива не будет в excl
  let valid = false;
  while (!valid) {
    shuffle(rest);
    const lastRest = rest[rest.length - 1];
    valid = !excl.includes(lastRest);
  }

  container.innerHTML = "";

  // вставляем кнопки 
  container.appendChild(firstBtn);
  rest.forEach(btn => container.appendChild(btn));
  container.appendChild(preBtn);
  container.appendChild(lastBtn); 
}

let isFull = false;      // Хранит состояние зоны (открыта/закрыта)
let isAnimating = false; // Блокирует спам-клики на 50мс

function changeZone(state = "open") {

  if (isAnimating) return; 
  isAnimating = true;

  const sprite = document.getElementById('heartIcon');
  const bContainer = document.getElementById('mButtonsContainer');
  
  const delayIcon = 50;
  const delayStyles = 0; 
  const delayText = 500;

  const firstBtn =  document.getElementById('firstBtn');

  if (state === "open") {
      firstBtn.dataset.href = "/identity"
      //firstBtn.dataset.g = "D"
      //firstBtn.classList.replace('bw', 'bd');
      //firstBtn.textContent = "\u00A0";
  } else {
      firstBtn.dataset.href = "/wolume"
      //firstBtn.dataset.g = "W"
      //firstBtn.textContent = "\u00A0";
      //firstBtn.classList.replace('bd', 'bw');
  }

  // Используем прямые команды вместо toggle
  // исключает риск рассинхрона стейта при спам-кликах
  setTimeout(() => {
    if (state === "open") {
      sprite.classList.add('is-full');
    } else {
      sprite.classList.remove('is-full');
    }
    isAnimating = false;
  }, delayIcon);

  const dButtons = Array.from(bContainer.querySelectorAll('button[data-g="D"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const wButtons = Array.from(bContainer.querySelectorAll('button[data-g="W"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const bButtons = Array.from(bContainer.querySelectorAll('button[data-g="B"]'))
    .filter(btn => btn.id !== 'lastBtn');


  if (state === "open") {
    setTimeout(() => {
      document.body.classList.add("invert");
      
      setTimeout(() => {
        //firstBtn.textContent = "*";
      }, delayText);

      dButtons.forEach(b => b.classList.add('dOpen'));
      wButtons.forEach(b => b.classList.add('wLock'));
      bButtons.forEach(b => b.classList.add('bLock'));

    }, delayStyles);
  
  } else {
    setTimeout(() => {
      document.body.classList.remove("invert");
      
      setTimeout(() => {
        //firstBtn.textContent = "~";
      }, delayText);

      dButtons.forEach(b => b.classList.remove('dOpen'));
      wButtons.forEach(b => b.classList.remove('wLock'));
      bButtons.forEach(b => b.classList.remove('bLock'));
    }, delayStyles);
  
  }
}

function onKeyCommand(e) {

  console.log("Press", e.code);
  e.preventDefault();
  e.stopImmediatePropagation(); // Чтобы другие скрипты не мешали

  if (e.code === "Backquote") {
    if (window.location.protocol === "file:") {
      window.location.href = "./wolume/index.html";
    } else {
      window.location.href = "./wolume";
    }
  }

  if (e.code === 'KeyE') {
    if (window.location.protocol === "file:") {
      window.location.href = "./exegesis/index.html";
    } else {
      window.location.href = "./exegesis";
    }
  }

  if (e.code === 'KeyR') {
    if (window.location.protocol === "file:") {
      window.location.href = "./renders/index.html";
    } else {
      window.location.href = "./renders";
    }
  }

  if (e.code === 'KeyG') {
    if (window.location.protocol === "file:") {
      window.location.href = "./графика/index.html";
    } else {
      window.location.href = "./графика";
    }
  }

  if (e.code === 'KeyH') {
    if (window.location.protocol === "file:") {
      window.location.href = "./негативы/index.html";
    } else {
      window.location.href = "./негативы";
    }
  }

  return
}

function connectActionsToBtns(){
  const buttons = Array.from(buttonContainer.querySelectorAll('button'));

  buttons.forEach(btn => {
    btn.addEventListener('click', async (ev) => {
      
      const lastBtn = document.getElementById('lastBtn');
      if (btn.id === 'lastBtn') {
          ev.preventDefault();
          isFull = !isFull;
          if (typeof changeZone === "function") changeZone(isFull ? "open" : "lock");
          return;
      }

      // прерываем для кнопок в статусе lock 
      if (btn.dataset.st === 'lock') {
        ev.preventDefault();
        return false;
      }

      if ( btn.classList.contains('wLock') ) {//|| btn.classList.contains('bLock')
        ev.preventDefault();
        return false;
      }

      // Для остальных кнопок
      let target = btn.dataset.href || '#';

      ev.preventDefault();
      buttonContainer.style.pointerEvents = 'none';
      await hideAllButtons();

      if (window.location.protocol === "file:") {
        // локальная отладка
        if (target.startsWith("/")) target = target.slice(1);
        target = target + ".html";
      } else {
        // сервер
        if (target.endsWith(".html")) {
          target = "/" + target.replace(".html", "");
        }
      }

      if (isMobile && btn.dataset.mb === 'true') {
        target = "/ios" + target + "/";
      }
      if (isMobile) {
        target = target + "/";
      }
    
      window.location.href = target;

    });
  });
}

function initPage() {

  if (isMobile) removeDeskBtnOnMobile();

  adjustFontByCount();

  shuffleButtonsWithRules();
  if (isMobile) removeOverflowLockBtns();
  checkLastRow();
  
  connectActionsToBtns();

  document.addEventListener("keydown", onKeyCommand);

  window.addEventListener('focus', () => {
      console.log("Фокус вернулся");
  });
}

// Init Block
initPage();

</script>

</body>
