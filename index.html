<script>
  const ua = navigator.userAgent.toLowerCase();
  const savedTheme = localStorage.getItem('theme'); 

  // set global platform variable !
  // iphone|ipad|ipod|android|blackberry|webos|iemobile|opera mini ;
  window.isMobile = /iphone|ipad|android/.test(ua);
  window.isLocal = (window.location.protocol === "file:");
  
  if (window.isMobile) {
    document.documentElement.classList.add('mobile');
  }

  if (savedTheme === 'dark') {
      window.theme = "dark";
      document.documentElement.setAttribute('data-theme', 'dark'); 
      document.documentElement.style.setProperty('--bg', '#000');      
  } else {
      window.theme = "light";
      document.documentElement.setAttribute('data-theme', 'light');
      document.documentElement.style.setProperty('--bg', '#e5e5e5');
  }
//console.log("EndPreScript", theme, isMobile, isLocal);
</script>

function getRowData(type = 'count') {
  //buttonContainer.offsetHeight; 
  const elements = Array.from(buttonContainer.children);
  if (!elements.length) return type === 'count' ? 0 : [];

  if (type === 'count') {
    return new Set(elements.map(el => el.offsetTop)).size;
  }
  if (type === 'items') {
    const lastTop = elements[elements.length - 1].offsetTop;
    return elements.filter(el => Math.abs(el.offsetTop - lastTop) < 5);
  }
}

function adjustFontByCount(){

};

// GUI Preload - Sort and Restruct Logic

function removeOverflowBtnsMobile() {
  if (!isMobile) return;
  const container = buttonContainer;

  let iteration = 0;
  while (getRowData('count') > MOBILE_TARGET_ROW) {
    iteration++;
    const currentRows = getRowData('count');
    const lockButtons = Array.from(container.querySelectorAll('button[data-st="lock"]'))
      .filter(btn => !['firstBtn', 'preBtn', 'lastBtn', 'obtn'].includes(btn.id));

    if (lockButtons.length === 0) {
      break;
    }

    let success = false;
    for (let j = lockButtons.length - 1; j >= 0; j--) {
      const btnToTry = lockButtons[j];
      const nextSibling = btnToTry.nextElementSibling;
      
      btnToTry.remove();
      const n = getRowData('count');

      if (n >= MOBILE_TARGET_ROW) {
        success = true;
        break; 
      } else {
        container.insertBefore(btnToTry, nextSibling);
      }
    }

    if (!success) {
      break;
    }
  }

  // Фикс односимвольных в нашем случае - слэш
  const endGroup = document.getElementById('endGroup');
  const obtn = document.getElementById('obtn');
  if (obtn && endGroup && obtn.nextElementSibling === endGroup) {
    const prevBtn = obtn.previousElementSibling;
    if (prevBtn && prevBtn.id !== 'firstBtn') {
      console.log("[Slash] move");
      container.insertBefore(obtn, prevBtn);
    }
  }
}

function checkLastRow() {
  const endGroup = document.getElementById('endGroup');

  function applyFix(items, mode = "mobile") {
    if (!endGroup || (mode === "mobile" && !isMobile)) return false;
    
    let targets = [];
    if (mode === "result") {
      targets = items.filter(el => el !== endGroup && el.id !== 'firstBtn' && el.id !== 'obtn');
    } else {
      targets = Array.from(buttonContainer.querySelectorAll('button'))
        .filter(btn => btn.id !== 'firstBtn' && btn.id !== 'obtn' && !endGroup.contains(btn) && btn.innerText.length > 2);
    }

    if (targets.length === 0){
      console.log("[Fix Failure] КАНДИДАТОВ НЕТ");
      return false;
    }

    // Режим MOBILE: работаем с одной кнопкой
    if (mode === "mobile") {
      targets.sort((a, b) => a.innerText.length - b.innerText.length);
      const bestBuddy = targets[0];
      const ghost = bestBuddy.cloneNode(true);

      ghost.id = ""; 
      ghost.dataset.ghost = "true"; 
      ghost.classList.add('btn_ghost'); // Метка для CSS (opacity 0 + no events)
      
      bestBuddy.parentNode.insertBefore(ghost, bestBuddy);
      endGroup.prepend(bestBuddy);
    } else { // Режим RESULT: работаем со всеми соседями
      [...targets].reverse().forEach(el => endGroup.prepend(el));
    }

    endGroup.style.flex = "1 0 100%"; 
    endGroup.style.marginLeft = "0";
    endGroup.style.justifyContent = "space-between";

    if(!isMobile) return true

    const currentCount = getRowData('count');

    if (currentCount !== MOBILE_TARGET_ROW) {
      console.log(`[Fix Failure] Нарушена сетка! Рядов: ${currentCount}. Откатываем...`);
      for (let j = 0; j < 3; j++) {
        const locks = Array.from(buttonContainer.querySelectorAll('button[data-st="lock"]'))
          .filter(btn => !['firstBtn', 'preBtn', 'lastBtn', 'obtn'].includes(btn.id) && !endGroup.contains(btn));
        
        if (locks.length > 0) {
          locks[locks.length - 1].remove();
          // Если после удаления всё встало на свои 8 строк
          if (getRowData('count') === MOBILE_TARGET_ROW) {
            console.log("[Успешно] Сетка восстановлена до 8 строк");
            return true;
          } 
        }
      }

      // Если удаление lock-кнопок выше не помогло:
      console.log("[Fix Failure] Не удалось спасти 8 строк. ОТКАТЫВАЕМ изменения.");
      const buddyInGroup = endGroup.querySelector('button:not(#preBtn):not(#lastBtn)');
      const ghost = Array.from(buttonContainer.children).find(el => el.dataset.ghost === "true");

      if (buddyInGroup && ghost) {
        ghost.replaceWith(buddyInGroup); 
        console.log(`[Rollback] Кнопка ${buddyInGroup.id} вернулась на базу.`);
      } else if (mode === "result") {
        // Добавляем .reverse(), чтобы вернуть кнопки в правильном порядке
        const neighbours = Array.from(endGroup.querySelectorAll('button:not(#preBtn):not(#lastBtn)'));
        neighbours.reverse().forEach(btn => buttonContainer.insertBefore(btn, endGroup));
      }

      // 3. СБРАСЫВАЕМ стили группы к дефолтным (как в CSS)
      endGroup.style.flex = "";
      endGroup.style.marginLeft = ""; 
      endGroup.style.justifyContent = "";

      return false; 
    }

    return true;
  }

  // Основная логика
  for (let i = 0; i < 3; i++) {
    const rowItems = getRowData('items'); 
    const n = rowItems.length; console.log("LastRowLength", n)
  
    if (n === 1) {
      if (isMobile && applyFix(rowItems, "mobile")){
        mergeFromCheck = true;
        break;
      } 

      const lockButtons = Array.from(buttonContainer.querySelectorAll('button[data-st="lock"]'))
        .filter(btn => !['preBtn', 'lastBtn', 'firstBtn', 'obtn'].includes(btn.id) && !endGroup.contains(btn));

      if (lockButtons.length === 0) {
        applyFix(rowItems, "result");
        break;
      }
      
      lockButtons[lockButtons.length - 1].remove();
      buttonContainer.offsetHeight;

    } else {
      applyFix(rowItems, "result");
      break;
    }
  }
}

function shuffleButtonsWithRules() {
  const container = buttonContainer;
  const firstBtn = document.getElementById('firstBtn');
  const endGroup = document.getElementById('endGroup');

  // Берем ВСЕ кнопки, которые НЕ входят в "неприкосновенные"
  const allBtns = Array.from(container.querySelectorAll('button'));
  const rest = allBtns.filter(b => b !== firstBtn && !endGroup.contains(b));

  const excl = rest.filter(b => b.dataset.href === "/const");

  if (rest.length === 0) return;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  let valid = false;
  while (!valid) {
    shuffle(rest);
    valid = !excl.includes(rest[rest.length - 1]);
  }

  container.appendChild(firstBtn);
  rest.forEach(btn => container.appendChild(btn));
  container.appendChild(endGroup); // Вставляем группу целиком
}

function fallbackMobileSnap() {
  // final fallback (remove last 3% error prev logic)
  if (!isMobile) return;
  
  //debugHalfBtnsRemove();

  const currentRows = getRowData('count');
  const isVert = (window.innerHeight > window.innerWidth);

  if (currentRows > 0 && currentRows < MOBILE_TARGET_ROW && isVert) {
    
    const buttonContainer = document.getElementById('mainButtons');
    //buttonContainer.offsetHeight; 

    const computedStyle = window.getComputedStyle(buttonContainer);
    const basePad = parseInt(computedStyle.paddingTop) || 12;
    const fg = parseInt(computedStyle.gap) || 10;

    const allBtns = Array.from(buttonContainer.children);
    if (!allBtns.length) return;

    buttonContainer.style.paddingTop = ""; // Сбрасываем ПЕРЕД замерами

    const firstTop = allBtns[0].offsetTop;
    const secondRowBtn = allBtns.find(btn => btn.offsetTop > firstTop + fg);
    
    const rowH = secondRowBtn ? (secondRowBtn.offsetTop - firstTop) : (allBtns[0].offsetHeight + fg);
    const fullHeight8 = (rowH * (MOBILE_TARGET_ROW) ) - fg;
    const currentHeight = (rowH * currentRows) - fg;
    const smartPadding = (fullHeight8 - currentHeight) + (basePad);

    buttonContainer.style.paddingTop = smartPadding + "px";
    // document.body.style.backgroundColor = "grey"; 
  }
}

      //firstBtn.textContent = "\u00A0";
      //firstBtn.classList.replace('bd', 'bw');
  }

  // Используем прямые команды вместо toggle
  // исключает риск рассинхрона стейта при спам-кликах
  setTimeout(() => {
    if (toDark) {
      sprite.classList.add('complete');
    } else {
      sprite.classList.remove('complete');
    }
    switchZoneInAnim = false;
  }, delayIcon);

  const dButtons = Array.from(bContainer.querySelectorAll('button[data-g="D"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const wButtons = Array.from(bContainer.querySelectorAll('button[data-g="W"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const bButtons = Array.from(bContainer.querySelectorAll('button[data-g="B"]'))
    .filter(btn => btn.id !== 'lastBtn');


  if (toDark) {
    setTimeout(() => {

      window.theme = "dark";
      document.documentElement.style.setProperty('--bg',    '#000');

      setTimeout(() => {
        //firstBtn.textContent = "*";
      }, delayText);

      dButtons.forEach(b => b.classList.add('dstate'));
      wButtons.forEach(b => b.classList.add('dstate'));
      bButtons.forEach(b => b.classList.add('dstate'));

    }, delayStyles);
  
  } else {
    setTimeout(() => {
      
      window.theme = "light";
      document.documentElement.style.setProperty('--bg',    '#e5e5e5');

      setTimeout(() => {
        //firstBtn.textContent = "~";
      }, delayText);

      dButtons.forEach(b => b.classList.remove('dstate'));
      wButtons.forEach(b => b.classList.remove('dstate'));
      bButtons.forEach(b => b.classList.remove('dstate'));
    }, delayStyles);
  
  }
}

function toggleHeart(){
  unlockHeart = !unlockHeart;
  turnToDark(unlockHeart);
  saveLocalStorage(); 
}

function hideAllButtons() {
  // Анимация скрытия всех кнопок

  return new Promise(resolve => {
    let finished = 0;
    const buttons = Array.from(buttonContainer.querySelectorAll('button'));

    const total = buttons.length;

    function onTransitionEnd(e) {
      if (e.propertyName !== 'opacity') return;
      finished++;
      if (finished >= total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }

    function cleanup(){
      buttons.forEach(btn => btn.removeEventListener('transitionend', onTransitionEnd));
    }

    // привязываем слушатель И запускаем анимацию скрытия
    buttons.forEach(btn => btn.addEventListener('transitionend', onTransitionEnd));
    // небольшая задержка, чтобы гарантировано применился класс и началась анимация
    requestAnimationFrame(() => {
      buttons.forEach(btn => btn.classList.add('btn_hide'));
    });

    // safety fallback — если transitionend не сработает, через 1.2s всё равно продолжим
    setTimeout(() => {
      if (finished < total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }, 1400);
  });
}

async function handleButtonClick(ev) {
  const btn = ev.target.closest('button');
  if (!btn) return;

  ev.preventDefault();

  if (btn.id === 'lastBtn') {
    toggleHeart();
    return;
  }

  if ( !unlockHeart && (btn.dataset.st === 'lock' && btn.classList.contains('bw'))  ){
    // блокировка нажатий только на светлом сайте
    return false;
  }


  let target = btn.dataset.href || '#';
  buttonContainer.style.pointerEvents = 'none'; // lock for clicks
  
  await hideAllButtons(); // anim opacity

  // Create URL
  if (isLocal) {
    if (target.startsWith("/")) target = target.slice(1);
    //target = target + ".html";
    target = target + "/index.html"; // if git rep
  
  } else {
    if (target.endsWith(".html")) {
      target = "/" + target.replace(".html", "");
    }
  }

  if (isMobile && btn.dataset.mb === 'true') {
    target = "/ios" + target + "/";
  }
  if (isMobile) {
    target = target + "/";
  }

  window.location.href = target;
}

function onKeyCommand(e) {
  const cod = e.code;
  const key = e.key;

  const pressedCtrl = e.ctrlKey;
  const pressedShift = e.shiftKey;

  //console.log("Press", cod, key);
  if(!pressedCtrl && !pressedShift){ // hardcore transit to page

    e.preventDefault();
    e.stopImmediatePropagation(); 

    if (cod === 'KeyV' || cod === "Space") return rebuildGUI("reset", true); // hard reset
    if (cod === 'KeyI') return toggleHeart();


    let targetHREF = null;
    if (cod === 'KeyR') targetHREF = "./renders";

    if(unlockHeart){
      if (cod === 'KeyE') targetHREF = "./exegesis";
      else if (cod === 'KeyH') targetHREF = "./негативы";
    }else{
      if (cod === "Backquote") targetHREF = "./wolume";
      else if (cod === 'KeyG') targetHREF = "./графика";
      else if (cod === 'KeyB') targetHREF = "./bread";
    }

    if (targetHREF) {
      if (isLocal) targetHREF = targetHREF + "/index.html";
      window.location.href = targetHREF;
    }
  }

  return
}

// GUI Updaters

function initSourceBtns() {
  const container = document.getElementById('mainButtons');

  container.querySelectorAll('button').forEach(btn => {
    btn.dataset.source = "true"; // Помечаем оригиналы
    
    if (window.theme === "dark") {
      btn.classList.add('dstate');
    }
  });

  // 2. Сохраняем эталон в SOURCE_BUTTONS один раз. больше  не меняеем 
  SOURCE_BUTTONS = Array.from(container.querySelectorAll('button')).map(btn => btn.cloneNode(true));

  // 3. добавляем слушатели
  container.addEventListener('click', handleButtonClick);
}


function updSourceBtns(mode){
    const container = document.getElementById('mainButtons');
    const domOrder = Array.from(container.querySelectorAll('button')); // все кнопки вклюая end группу

    if(mode === "reset"){
      // ПОЛНАЯ ПЕРЕЗАПИСЬ (Сортировка + Метки)
      const sorted = [];
      domOrder.forEach(domBtn => {
        const found = SOURCE_BUTTONS.find(s => 
          (domBtn.id && s.id === domBtn.id) || 
          (domBtn.dataset.ghost === "true" && s.dataset.href === domBtn.dataset.href)
        );

        if (found) {
          if (found.dataset.ghost !== "true") {

              found.dataset.ghost = (domBtn.dataset.ghost === "true") ? "true" : "false";
              if(found.dataset.ghost === "true") console.log("GHOST!")
          }
          
          if (!sorted.includes(found)) sorted.push(found);
        }
      });

      SOURCE_BUTTONS.forEach(s => { 
        const alreadyIn = sorted.some(already => 
          (already.id && s.id && already.id === s.id) || 
          (already.dataset.href === s.dataset.href)
        );
        if (!alreadyIn) {
          s.dataset.ghost = "false";
          sorted.push(s);
        }
      });
      
      SOURCE_BUTTONS = sorted;
      //console.log(SOURCE_BUTTONS) 

    } else { 
      // ТОЛЬКО МЕТКИ (Порядок не трогаем)
      const domButtons = Array.from(container.children).filter(el => el.tagName === 'BUTTON');

      SOURCE_BUTTONS.forEach(s => {
          // Ищем кнопку в основном списке
          const domBtn = domButtons.find(d => (d.id && d.id === s.id) || (d.dataset.href === s.dataset.href));
          if (domBtn) {
              s.dataset.ghost = (domBtn.dataset.ghost === "true") ? "true" : "false";
          } else {
              s.dataset.ghost = "true"; 
          }
      });
    }
}


function restoreSourceBtns(mode) {
  const container = document.getElementById('mainButtons');
  const endGroup = document.getElementById('endGroup');

  mergeFromCheck = false;
  container.innerHTML = "";
    
  if (mode === "reset") {
    // удаляем госта из End группы
    Array.from(endGroup.children).forEach(btn => {
      if (btn.id !== 'preBtn' && btn.id !== 'lastBtn') btn.remove();
    });
  }else{ 
  }

  // 1. Восстановление FirstBtn
  const fOrig = SOURCE_BUTTONS.find(b => b.id === 'firstBtn');
  if (fOrig) {
    const fClone = fOrig.cloneNode(true);
    fClone.dataset.href = unlockHeart ? "/identity" : "/wolume";
    container.appendChild(fClone);
  }

  // 2. Отрисовка основного состава
  SOURCE_BUTTONS.forEach(btn => {
    if (btn.id !== 'firstBtn' && btn.id !== 'preBtn' && btn.id !== 'lastBtn') {
      const clone = btn.cloneNode(true);
      
      // СНАЧАЛА проверяем, гост это или нет (независимо от темы)
      if (btn.dataset.ghost === "true") {
        clone.style.opacity = "0"; 
        clone.classList.add('btn_ghost'); 
        clone.id = ""; 
        clone.dataset.ghost = "true"; 
      } else {

        if (unlockHeart) {  
          const g = clone.dataset.g;
          if (g === "D") clone.classList.add('dstate');
          if (g === "W") clone.classList.add('dstate');
          if (g === "B") clone.classList.add('dstate');
        } else {
          clone.classList.remove('dstate');
        }
      }
      container.appendChild(clone);
    }
  });

  // 3. Конечная группа (дубликат из DOM)
  container.appendChild(endGroup);

  const sprite = document.getElementById('heartIcon');
  if (unlockHeart) sprite.classList.add('complete');
  else sprite.classList.remove('complete');
  endGroup.style.flex = endGroup.style.marginLeft = endGroup.style.justifyContent = "";
}


function rebuildGUI(mode = "update", shuffle = false) { 
  // modes reset/update



  restoreSourceBtns(mode); // пересобирает через innerHtml по массиву

  if (shuffle) shuffleButtonsWithRules();
  
  removeOverflowBtnsMobile();
  
  if (mode === "reset") checkLastRow();

  if (isMobile) fallbackMobileSnap();
  
  if(isMobile && mode === "update"){
    
    const endGroup = document.getElementById('endGroup');
    if(lastWidth === initWidth){
      endGroup.style.flex = "1 0 100%"; 
      endGroup.style.marginLeft = "0";
      endGroup.style.justifyContent = "space-between";
    }else{
      endGroup.style.flex = "auto";
      endGroup.style.marginLeft = "";
      endGroup.style.justifyContent = "";
    }
  }

  updSourceBtns(mode);
}


function initPage() {
  console.log("InitPage / Mobile:", isMobile);
  checkWidescreen();

  // Prepare
  removeDeskBtnOnMobile();
  adjustFontByCount();
  initSourceBtns();

  // Rebuild
  rebuildGUI("reset", true);

  // Events

  if(isMobile){
    window.addEventListener('touchstart', () => isTouching = true, {passive: true});
    window.addEventListener('touchend', () => isTouching = false, {passive: true});

    window.addEventListener('resize', () => {
      //if (isLocal) return; 
      if (isTouching) return; 
      
      // 1. Проверяем изменение
      if (window.innerWidth === lastWidth) return;
      lastWidth = window.innerWidth;
      
      clearTimeout(resizeTimeout);

      resizeTimeout = setTimeout(() => {
        rebuildGUI(); // "current" state
      }, 250);
    });
  }else{
    document.addEventListener("keydown", onKeyCommand); 

    window.addEventListener('focus', () => {
        console.log("Фокус вернулся");
    });
  }
}

// Initialization

initPage();
saveLocalStorage();
