<script>
  const ua = navigator.userAgent.toLowerCase();
  const savedTheme = localStorage.getItem('theme'); 

  // set global platform variable !
  // iphone|ipad|ipod|android|blackberry|webos|iemobile|opera mini ;
  window.isMobile = /iphone|ipad|android/.test(ua);
  window.isLocal = (window.location.protocol === "file:");
  
  if (window.isMobile) {
    document.documentElement.classList.add('mobile');
  }

  if (savedTheme === 'dark') {
      window.theme = "dark";
      document.documentElement.setAttribute('data-theme', 'dark'); 
      document.documentElement.style.setProperty('--bg', '#000');      
  } else {
      window.theme = "light";
      document.documentElement.setAttribute('data-theme', 'light');
      document.documentElement.style.setProperty('--bg', '#e5e5e5');
  }
//console.log("EndPreScript", theme, isMobile, isLocal);
</script>

*{box-sizing:border-box;margin:0;padding:0}
html, body {

[hidden] { display: none !important; }

/* 1. Main Geometry */
.fswrap {
position: fixed; inset: 0;
display: flex; align-items: center;
justify-content: center; z-index: 1000;
}
.mobile .fswrap {
top: env(safe-area-inset-top, 0);

right: env(safe-area-inset-right, 0);

}

.mobile .fswrap.stickToBot {

}

/* 2. Btns Geometry */
.btnsWrap {
display: flex; flex-wrap: wrap;
justify-content: space-between;
background: transparent;

/* Desktop */
width: min(90vw, 700px); height: min(90vh, 680px);
align-content: center;

}

@media (max-width:420px){ /* Web Adapt */
  .btnsWrap { 
    padding:12px; 
    gap:10px; 
  }
}

.mobile .btnsWrap {
  width: auto; height: auto;
  align-content: normal;
  padding: max(12px, env(safe-area-inset-top))
           max(12px, env(safe-area-inset-right))
           max(12px, env(safe-area-inset-bottom))
           max(12px, env(safe-area-inset-left));
  gap: 10px; 
}

.endBtnWrapper {
display: inline-flex;
gap: inherit; 
flex: 0 0 auto;
}

.mobile .endBtnWrapper { /* предохранитель */
margin-left: auto; /* прижмет группу вправо */
}

.btnsWrap button {

  padding:12px; font-size:1.25rem; color: gray; border: 0; cursor:pointer;
  transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color .6s ease;
  will-change: opacity, transform; z-index: 99; user-select: none; background: transparent;

  font-weight: 400 !important; 
  font-variation-settings: "wght" 400;

  -webkit-text-stroke-width: 0px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

@media (max-width:420px){ /* Web Adapt */
  .btnsWrap button { 
    padding:10px 14px; 
    font-size:1rem; 
  }
}

.mobile .btnsWrap button { 
  padding: 10px 14px; 
  font-size: 1rem; 
}

.btnsWrap button[data-st="lock"] { color: rgba(70,70,70,1.0); }

/* - Buttons Desktop Special */
@media (hover: hover) {
  .btnsWrap button:not([data-st="lock"]):hover { opacity: .5; }
  .btnsWrap button[data-st="lock"] { cursor: grab; }
  .btnsWrap button[data-st="lock"]:active {
    cursor: grabbing; transform: scale(0.99); color: rgba(50,50,50,1.0); 
  }
}

/* - Buttons by Groups (bd = dark, bw = white, bb = both) */
.btnsWrap button.bd, .btnsWrap button.bw, .btnsWrap button.bb {
  cursor: default; pointer-events: none;
}

/* - Buttons on White Page State (default) */
.btnsWrap button.bd { color: rgba(128, 128, 128, 0); }
.btnsWrap button.bb, .btnsWrap button.bw { color: #9b9b9b; }

/* - Buttons Special */

.btnsWrap button.bw:not([data-st="lock"]){
  pointer-events: auto; cursor: pointer; 
}

/* - Buttons on Dark Page State */
.btnsWrap button.bd.dstate {
  pointer-events: auto; cursor: pointer; color: rgba(128, 128, 128, 1);
  transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color 1.6s ;

.btnsWrap button.bw.dstate, .btnsWrap button.bb.dstate {

}
.btnsWrap button.bw.dstate:active, .btnsWrap button.bb.dstate:active {

<script>

const DESK_TARGET_ROW = 5; // Desktop
const PORT_MOB_TRGT = 8;   // Portrait on Mobile
const ALBM_MOB_TRGT = 3;   // Album on Mobile

let INIT_TARGET_ROW = isMobile ? PORT_MOB_TRGT : DESK_TARGET_ROW; // port on init
let TEMP_TARGET_ROW = INIT_TARGET_ROW; // Основная переменная для вычислений


 // contain struct page btns (need for innerHtml)
let SOURCE_BUTTONS = [];

let mergeFromCheck = false;
let unlockHeart = (theme === "dark");  // flag current state page (group W\D)
let switchZoneInAnim = false;          // flag block spam click on 50ms

// safe iphone flags
let resizeTimeout, isWideScreen;
let isTouching = false;


let initWidth = window.innerWidth;                
let lastWidth = window.innerWidth; 

const buttonContainer = document.getElementById('mainButtons');

// onload js solvers

(function(id, src) {
  // Замена static на sprite по готовности картинки
  const img = new Image();
  img.src = src;
  // Ждем готовности картинки к отрисовке
  img.decode().then(() => {
    document.getElementById(id).classList.add('h_sprite');
    if(unlockHeart) document.getElementById(id).classList.add('complete');
  }).catch(() => { /* если картинка битая, останется SVG */ });
})('heartIcon', "/content/heart_sprite.png");

window.addEventListener("pageshow", (event) => {
  // ВОССТАНОВЛЕНИЕ ПОСЛЕ ВОЗВРАТА НАЗАД

  if (event.persisted) {
    // только восстанавливаем видимость скрытых кнопок
    const buttons = Array.from(buttonContainer.querySelectorAll('button'));
    buttons.forEach(btn => {
      if(btn.classList.contains('btn_hide')){
        btn.classList.remove('btn_hide');
        btn.style.visibility = 'visible';
      }
    });
    buttonContainer.style.pointerEvents = "";
  }
});


// Helpers & Debugs

function checkWidescreen(x, y) {
  const valueX = x || window.innerWidth; 
  const valueY = y || window.innerHeight;
  const isWide = (valueX > valueY); 

  if (x && y) return isWide;

  if (isWide !== isWideScreen) {
    isWideScreen = isWide;
    return true; // Изменилось
  }
  return false; // Не изменилось
}

function getRowData(type = 'count') {
  //buttonContainer.offsetHeight; 
  const elements = Array.from(buttonContainer.children);
  if (!elements.length) return type === 'count' ? 0 : [];

  if (type === 'count') {
    return new Set(elements.map(el => el.offsetTop)).size;
  }
  if (type === 'items') {
    const lastTop = elements[elements.length - 1].offsetTop;
    return elements.filter(el => Math.abs(el.offsetTop - lastTop) < 5);
  }
}

function saveLocalStorage() {
  localStorage.setItem('theme', unlockHeart ? 'dark' : 'light');
}


// GUI Preload

function adjustFontByCount(){
  // подстройка размера шрифта в зависимости от кол-ва кнопок 
  // простая эвристика: чем больше кнопок — тем меньше шрифт

  const buttons = Array.from(buttonContainer.querySelectorAll('button'));
  const n = buttons.length;
  const base = isMobile ? 4.4 : 4.6; //web - 4.6 
  const sizeRem = Math.max(0.9, base - (n - 3) * 0.12);
  buttons.forEach(b => b.style.fontSize = sizeRem + 'rem');
};

function removeDeskBtnOnMobile() {

  const container = document.getElementById('mainButtons');
  const btnsToRemove = container.querySelectorAll('button[data-mh="true"]');

  btnsToRemove.forEach(btn => {
    btn.remove();
  });
}


// GUI Preload - Sort and Restruct Logic

function removeOverflowBtnsUpdate() {
  const container = buttonContainer;

  let iteration = 0;
  while (getRowData('count') > TEMP_TARGET_ROW) {
    iteration++;
    const currentRows = getRowData('count');
    const lockButtons = Array.from(container.querySelectorAll('button[data-st="lock"]'))
      .filter(btn => !['firstBtn', 'preBtn', 'lastBtn', 'obtn'].includes(btn.id));

    if (lockButtons.length === 0) {
      break;
    }

    let success = false;
    for (let j = lockButtons.length - 1; j >= 0; j--) {
      const btnToTry = lockButtons[j];
      const nextSibling = btnToTry.nextElementSibling;
      
      btnToTry.remove();
      const n = getRowData('count');

      if (n >= TEMP_TARGET_ROW) {
        success = true;
        break; 
      } else {
        container.insertBefore(btnToTry, nextSibling);
      }
    }

    if (!success) {
      break;
    }
  }

  // Фикс односимвольных в нашем случае - слэш
  const endGroup = document.getElementById('endGroup');
  const obtn = document.getElementById('obtn');
  if (obtn && endGroup && obtn.nextElementSibling === endGroup) {
    const prevBtn = obtn.previousElementSibling;
    if (prevBtn && prevBtn.id !== 'firstBtn') {
      console.log("[Slash] move");
      container.insertBefore(obtn, prevBtn);
    }
  }
}

// не до конца протестирован
function checkLastRowRef(mode, replaced) {
  const endGroup = document.getElementById('endGroup');
  const baseWidth = buttonContainer.parentNode.clientWidth - 15;

  const api = {
    count: () => getRowData('count'),
    items: () => getRowData('items'),
    style: state => {
      const e = state === "expand";
      endGroup.style.flex = e ? "1 0 100%" : "";
      endGroup.style.marginLeft = e ? "0" : "";
      endGroup.style.justifyContent = e ? "space-between" : "";
    },
    locks: () => [...buttonContainer.querySelectorAll('button[data-st="lock"]')]
      .filter(b => !['firstBtn','preBtn','lastBtn','obtn'].includes(b.id) && !endGroup.contains(b))
  };

  function textCorrection() { 
    const btnToShorten = endGroup.children[0];
    const originalText = btnToShorten.dataset.original || btnToShorten.textContent.trim();
    btnToShorten.dataset.original = originalText;
    if (originalText.length > 4) {
        btnToShorten.textContent = originalText.substring(0, 4) + "..";
    }
  }

  function applyFix(items, mode = "line") {
    if (!endGroup) return false;

    const targets = mode === "line"
      ? items.filter(el => el !== endGroup && !['firstBtn','obtn'].includes(el.id))
      : [...buttonContainer.querySelectorAll('button')]
          .filter(btn => btn.id !== 'firstBtn' && btn.id !== 'obtn' && !endGroup.contains(btn) && btn.innerText.length > 2);

    if (!targets.length) return console.log("[Fix Failure] КАНДИДАТОВ НЕТ"), false;

    if (mode === "mobile") {
      const bestBuddy = targets.sort((a,b)=>a.innerText.length-b.innerText.length)[0],
            ghost = bestBuddy.cloneNode(true);

      ghost.id = "";
      ghost.dataset.ghost = "true";
      ghost.classList.add('btn_ghost');

      bestBuddy.parentNode.insertBefore(ghost, bestBuddy);
      endGroup.prepend(bestBuddy);

    } else [...targets].reverse().forEach(el => endGroup.prepend(el));

    api.style("expand"); if (!isMobile) return true;

    const currentCount = api.count();
    if (currentCount === TEMP_TARGET_ROW) return true;

    console.log(`[checkLastRow][FixFailure] Нарушена сетка! Рядов: ${currentCount}`);

    if (currentCount > TEMP_TARGET_ROW) {

      for (let j = 0; j < 3; j++) {
        const locks = api.locks();
        if (!locks.length) break;

        locks.at(-1).remove();

        if (api.count() === TEMP_TARGET_ROW)
          return console.log(`[checkLastRow][Success] Сетка восстановлена`), true;
      }

    } else {
      console.log(`[checkLastRow] Рядов мало (${currentCount})`);

      const candidates = [...endGroup.querySelectorAll('button:not(#preBtn):not(#lastBtn)')]
        .filter(btn => btn !== replaced);

      for (const btn of candidates) {
        buttonContainer.insertBefore(btn, endGroup);

        if (api.count() === TEMP_TARGET_ROW)
          return console.log(`[checkLastRow][Success] Ряд восстановлен`), true;
      }
    }

    console.log(`[checkLastRow][Rollback]`);
    const buddyInGroup = endGroup.querySelector('button:not(#preBtn):not(#lastBtn)'),
          ghost = [...buttonContainer.children].find(el => el.dataset.ghost === "true");

    if (buddyInGroup && ghost) ghost.replaceWith(buddyInGroup);
    else if (mode === "line")
      [...endGroup.querySelectorAll('button:not(#preBtn):not(#lastBtn)')]
        .reverse()
        .forEach(btn => buttonContainer.insertBefore(btn, endGroup));

    api.style("reset");
    return false;
  }

  let currentRows = api.count(), rowItems = api.items();

  // reorient
  if (mode === "force") {
    console.log("[checkLastRow][FORCE] Start");
    endGroup.prepend(replaced);

    if (currentRows < TEMP_TARGET_ROW) {
      const visibleButtons = new Set(
        [...buttonContainer.querySelectorAll('button')]
          .map(b => b.dataset.href)
          .filter(Boolean)
      );

      const candidatesToRestore = SOURCE_BUTTONS.filter(src =>
        src.dataset.href &&
        !visibleButtons.has(src.dataset.href) &&
        !['firstBtn','obtn'].includes(src.id) &&
        !endGroup.contains(src)
      );

      for (const srcBtn of candidatesToRestore) {
        const clone = srcBtn.cloneNode(true);
        buttonContainer.insertBefore(clone, endGroup);

        const nextRows = api.count();

        if (nextRows <= TEMP_TARGET_ROW) {

          if (unlockHeart) {
            const g = clone.dataset.g;
            if (["D","W","B"].includes(g)) clone.classList.add('dstate');
          }

          currentRows = nextRows;
          console.log("[checkLastRow][FORCE][Restore]", clone.dataset.href, "Rows:", currentRows);

        } else {
          clone.remove();
          break;
        }
      }
    }

    currentRows = api.count();

    if (currentRows > TEMP_TARGET_ROW) {
      console.log("[checkLastRow][FORCE][Removing]");

      const allowedForDeletion = [...buttonContainer.children]
        .filter(b =>
          b !== endGroup &&
          b.id !== 'firstBtn' &&
          (b.dataset.st === "lock" || b.dataset.g === "W")
        );

      while (allowedForDeletion.length && api.count() > TEMP_TARGET_ROW) {
        const btn = allowedForDeletion.pop();
        console.log("[checkLastRow][FORCE][Removing]", btn.dataset.href);
        btn.remove();
      }
    }

    currentRows = api.count();
    rowItems = api.items();

    if (currentRows > TEMP_TARGET_ROW) return api.style("reset");
    if (currentRows === TEMP_TARGET_ROW) {
        rowItems.filter(item => item !== endGroup).forEach(item => endGroup.prepend(item));
    }

    if (rowItems.length === 1 && endGroup.children.length === 3) {
        if (endGroup.offsetWidth > (baseWidth)) textCorrection();
    }

    console.log("[checkLastRow][FORCE][DONE]");
    return api.style("expand");
  }

  let nItems = rowItems.length;
  console.log("[checkLastRow] Count on LastRow:", nItems, "elems");

  if (nItems === 1 && isMobile)
    return console.log("[checkLastRow][Mode] Mobile"),
      applyFix(rowItems, "mobile"),
      mergeFromCheck = true;

  for (let i = 0; i < 3; i++) {
    rowItems = api.items();
    nItems = rowItems.length;

    if (nItems === 1) {
      const bFoDelete = api.locks();

      if (!bFoDelete.length) { console.log("[checkLastRow][Mode] Merge");
        applyFix(rowItems);
        break;
      }

      bFoDelete.at(-1).remove();
      buttonContainer.offsetHeight;

    } else { console.log("[checkLastRow][Mode] Merge all");
      applyFix(rowItems);

function checkLastRowHard(mode, replaced) { 
  const endGroup = document.getElementById('endGroup'), 
        cont = buttonContainer, 
        target = TEMP_TARGET_ROW;
  if (!endGroup) return;

  const getC = () => getRowData('count'),
        getI = () => getRowData('items'),
        isSys = b => ['firstBtn','preBtn','lastBtn','obtn'].includes(b.id) || b.dataset.ghost,
        isMove = b => !isSys(b) && !endGroup.contains(b),
        setStyle = s => {
          const e = s === "expand";
          endGroup.style.flex = e ? "1 0 100%" : "";
          endGroup.style.marginLeft = endGroup.style.justifyContent = e ? "0" : "";
          if (e) endGroup.style.justifyContent = "space-between";
        };

  function fix(items, isMob = false) {
    let tg = isMob ? [[...cont.querySelectorAll('button')].filter(b => isMove(b) && b.innerText.length > 2).sort((a,b)=>a.innerText.length-b.innerText.length)[0]]
                   : items.filter(el => el !== endGroup && !isSys(el));
    
    tg = tg.filter(Boolean); if (!tg.length) return false;

    if (isMob) {
      const g = tg[0].cloneNode(true); g.id = ""; g.dataset.ghost = "true"; g.classList.add('btn_ghost');
      tg[0].parentNode.insertBefore(g, tg[0]);
    }

    [...tg].reverse().forEach(el => endGroup.prepend(el));
    setStyle("expand");

    if (isMobile && getC() !== target) {
      if (getC() > target) {
        for (let j = 0; j < 3; j++) {
          const l = [...cont.querySelectorAll('button[data-st="lock"]')].filter(isMove);
          if (l.length) { l.at(-1).remove(); if (getC() === target) return true; }
        }
      } else {
        const c = [...endGroup.querySelectorAll('button:not(#preBtn):not(#lastBtn)')].filter(b => b !== replaced);
        for (const b of c) { cont.insertBefore(b, endGroup); if (getC() === target) return true; }
      }
      const bdy = endGroup.querySelector('button:not(#preBtn):not(#lastBtn)'), gh = [...cont.children].find(e => e.dataset.ghost === "true");
      if (isMob && bdy && gh) gh.replaceWith(bdy);
      else if (!isMob) [...tg].reverse().forEach(b => cont.insertBefore(b, endGroup));
      setStyle("reset"); return false;
    }
    return true;
  }

  if (mode === "force") {
    endGroup.prepend(replaced);

    if (getC() < target) {
      const vis = new Set([...cont.querySelectorAll('button')].map(b => b.dataset.href).filter(Boolean));
      for (const s of SOURCE_BUTTONS) {
        if (!s.dataset.href || vis.has(s.dataset.href) || isSys(s) || endGroup.contains(s)) continue;
        const c = s.cloneNode(true); cont.insertBefore(c, endGroup);
        if (getC() <= target) { if (unlockHeart && ["D","W","B"].includes(c.dataset.g)) c.classList.add('dstate'); }
        else { c.remove(); break; }
      }
    }

    if (getC() > target) {
      const al = [...cont.children].filter(b => b !== endGroup && b.id !== 'firstBtn' && (b.dataset.st === "lock" || b.dataset.g === "W"));
      while (al.length && getC() > target) al.pop().remove();
    }

    if (getC() === target) {
      const rowItems = getI();
      rowItems.filter(b => b !== endGroup).forEach(b => endGroup.prepend(b));

      if (rowItems.length === 1 && endGroup.children.length === 3 && endGroup.offsetWidth > (cont.parentNode.clientWidth - 15)) {
        const b = endGroup.children[0], t = b.dataset.original ||= b.textContent.trim();
        if (t.length > 4) b.textContent = t.slice(0,4) + "..";
      }
    }

    return setStyle("expand");
  }

  let rI = getI();
  if (rI.length === 1 && isMobile) return fix(rI, true), mergeFromCheck = true;
  
  for (let i = 0; i < 3; i++) {
    rI = getI();
    if (rI.length === 1) {
      const l = [...cont.querySelectorAll('button[data-st="lock"]')].filter(isMove);
      if (!l.length) { fix(rI); break; }
      l.at(-1).remove(); cont.offsetHeight;
    } else { fix(rI); break; }
  }
}

function shuffleButtonsWithRules() {
  const container = buttonContainer;
  const firstBtn = document.getElementById('firstBtn');
  const endGroup = document.getElementById('endGroup');

  // Берем ВСЕ кнопки, которые НЕ входят в "неприкосновенные"
  const allBtns = Array.from(container.querySelectorAll('button'));
  const rest = allBtns.filter(b => b !== firstBtn && !endGroup.contains(b));

  const excl = rest.filter(b => b.dataset.href === "/const");

  if (rest.length === 0) return;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  let valid = false;
  while (!valid) {
    shuffle(rest);
    valid = !excl.includes(rest[rest.length - 1]);
  }

  container.appendChild(firstBtn);
  rest.forEach(btn => container.appendChild(btn));
  container.appendChild(endGroup); // Вставляем группу целиком
}

function fallbackMobileSnap() {

  //debugHalfBtnsRemove();

  const currentRows = getRowData('count');
  const isVert = (window.innerHeight > window.innerWidth);

    const buttonContainer = document.getElementById('mainButtons');
    //buttonContainer.offsetHeight; 

    const computedStyle = window.getComputedStyle(buttonContainer);
    const basePad = parseInt(computedStyle.paddingTop) || 12;
    const fg = parseInt(computedStyle.gap) || 10;

    const allBtns = Array.from(buttonContainer.children);
    if (!allBtns.length) return;

    buttonContainer.style.paddingTop = ""; // Сбрасываем ПЕРЕД замерами

    const firstTop = allBtns[0].offsetTop;
    const secondRowBtn = allBtns.find(btn => btn.offsetTop > firstTop + fg);
    
    const rowH = secondRowBtn ? (secondRowBtn.offsetTop - firstTop) : (allBtns[0].offsetHeight + fg);
    const fullHeight8 = (rowH * (TEMP_TARGET_ROW) ) - fg;
    const currentHeight = (rowH * currentRows) - fg;
    const smartPadding = (fullHeight8 - currentHeight) + (basePad);

    buttonContainer.style.paddingTop = smartPadding + "px";
    // document.body.style.backgroundColor = "grey"; 
  }else{

function hideAllButtons() {
  // Анимация скрытия всех кнопок

  return new Promise(resolve => {
    let finished = 0;
    const buttons = Array.from(buttonContainer.querySelectorAll('button'));

    const total = buttons.length;

    function onTransitionEnd(e) {
      if (e.propertyName !== 'opacity') return;
      finished++;
      if (finished >= total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }

    function cleanup(){
      buttons.forEach(btn => btn.removeEventListener('transitionend', onTransitionEnd));
    }

    // привязываем слушатель И запускаем анимацию скрытия
    buttons.forEach(btn => btn.addEventListener('transitionend', onTransitionEnd));
    // небольшая задержка, чтобы гарантировано применился класс и началась анимация
    requestAnimationFrame(() => {
      buttons.forEach(btn => btn.classList.add('btn_hide'));
    });

    // safety fallback — если transitionend не сработает, через 1.2s всё равно продолжим
    setTimeout(() => {
      if (finished < total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }, 1400);
  });
}

async function handleButtonClick(ev) {
  const btn = ev.target.closest('button');
  if (!btn) return;

  ev.preventDefault();

  if (btn.id === 'lastBtn') {
    toggleHeart();
    return;
  }

  if ( btn.dataset.st === 'lock' || (unlockHeart && btn.classList.contains('bw') )  ){
    console.log("lock for click")
    return false;
  }

  let target = btn.dataset.href || '#';
  // lock for clicks before transit
  buttonContainer.style.pointerEvents = 'none'; 
  
  await hideAllButtons(); // anim opacity

  // Create URL
  if (isLocal) {
    if (target.startsWith("/")) target = target.slice(1);
    //target = target + ".html";
    target = target + "/index.html"; // if git rep
  
  } else {
    if (target.endsWith(".html")) {
      target = "/" + target.replace(".html", "");
    }
  }

  if (isMobile && btn.dataset.mb === 'true') {
    target = "/ios" + target + "/";
  }
  if (isMobile) {
    target = target + "/";
  }

  window.location.href = target;
}

function onKeyCommand(e) {
  const cod = e.code;
  const key = e.key;

  const pressedCtrl = e.ctrlKey;
  const pressedShift = e.shiftKey;

  //console.log("Press", cod, key);
  if(!pressedCtrl && !pressedShift){ // hardcore transit to page

    e.preventDefault();
    e.stopImmediatePropagation(); 

    if (cod === 'KeyV' || cod === "Space") return rebuildGUI("reset", true); // hard reset
    if (cod === 'KeyI') return toggleHeart();


    let targetHREF = null;
    if (cod === 'KeyR') targetHREF = "./renders";

    if(unlockHeart){
      if (cod === 'KeyE') targetHREF = "./exegesis";
      else if (cod === 'KeyH') targetHREF = "./негативы";
      else if (cod === 'KeyB') targetHREF = "./flipbook";
      else if (cod === 'KeyF') targetHREF = "./fe";
    }else{
      if (cod === "Backquote") targetHREF = "./wolume";
      else if (cod === 'KeyG') targetHREF = "./графика";
      else if (cod === 'KeyB') targetHREF = "./bread";
    }

    if (targetHREF) {
      if (isLocal) targetHREF = targetHREF + "/index.html";
      window.location.href = targetHREF;
    }
  }

  return
}

function updSourceBtns(mode){
    const container = document.getElementById('mainButtons');
    const domOrder = Array.from(container.querySelectorAll('button')); // все кнопки вклюая end группу

    if(mode === "reset"){ // ПОЛНАЯ ПЕРЕЗАПИСЬ (Сортировка + Метки)
      const sorted = [];
      domOrder.forEach(domBtn => {
        const found = SOURCE_BUTTONS.find(s => 
          (domBtn.id && s.id === domBtn.id) || 
          (domBtn.dataset.ghost === "true" && s.dataset.href === domBtn.dataset.href)
        );

        if (found) {
          if (found.dataset.ghost !== "true") {
              found.dataset.ghost = (domBtn.dataset.ghost === "true") ? "true" : "false";
              //if(found.dataset.ghost === "true") console.log("GHOST!")
          }
          
          if (!sorted.includes(found)) sorted.push(found);
        }
      });

      SOURCE_BUTTONS.forEach(s => { 
        const alreadyIn = sorted.some(already => 
          (already.id && s.id && already.id === s.id) || 
          (already.dataset.href === s.dataset.href)
        );
        if (!alreadyIn) {
          s.dataset.ghost = "false";
          sorted.push(s);
        }
      });
      
      SOURCE_BUTTONS = sorted;
      console.log("[updSourceBtns][Init]", SOURCE_BUTTONS.map(s => s.dataset.href).join(', '));

    } else { 

      // ТОЛЬКО МЕТКИ
      const domButtons = Array.from(container.children).filter(el => el.tagName === 'BUTTON');
      SOURCE_BUTTONS.forEach(s => {

          const domIdx = domButtons.findIndex(d => d.dataset.href === s.dataset.href);

           if (domIdx !== -1) {
              const domBtn = domButtons[domIdx];
              s.dataset.ghost = (domBtn.dataset.ghost === "true") ? "true" : "false";
              s.dataset.idx = domIdx; 
              //if(domBtn.dataset.ghost === "true"){console.log("позиция", domIdx)}
          } else {
              //s.dataset.ghost = "true"; 
            s.dataset.idx = -1; 
          }
      });

    }
}

function restoreSourceBtns() {
  const container = document.getElementById('mainButtons');
  const endGroup = document.getElementById('endGroup');

  mergeFromCheck = false;
  container.innerHTML = "";
  
  const recoverState = (btn) => {
    if (unlockHeart) {  
      const g = btn.dataset.g;
      if (g === "D") btn.classList.add('dstate');
      if (g === "W") btn.classList.add('dstate');
      if (g === "B") btn.classList.add('dstate');
    } else {
      btn.classList.remove('dstate');
    }
  };

  // 1. Восстановление FirstBtn
  const fOrig = SOURCE_BUTTONS.find(b => b.id === 'firstBtn');
  if (fOrig) {
    const fClone = fOrig.cloneNode(true);
    fClone.dataset.href = unlockHeart ? "/identity" : "/wolume";
    recoverState(fClone)
    container.appendChild(fClone);
  }

  // 2. Отрисовка основного состава
  SOURCE_BUTTONS.forEach(btn => {
    if (btn.id !== 'firstBtn' && btn.id !== 'preBtn' && btn.id !== 'lastBtn') {
      
      const clone = btn.cloneNode(true);
      recoverState(clone);
      container.appendChild(clone);
    }
  });

  // 3. Конечная группа (дубликат из DOM)
  Array.from(endGroup.children).forEach(btn => {
    if (btn.id !== 'preBtn' && btn.id !== 'lastBtn') btn.remove();
  });
  container.appendChild(endGroup); // держит стиль так как из Dom

  const sprite = document.getElementById('heartIcon');
  if (unlockHeart) sprite.classList.add('complete');
  else sprite.classList.remove('complete');
  endGroup.style.flex = endGroup.style.marginLeft = endGroup.style.justifyContent = "";
}

function reOrientFix(mode = "init", targetHREF) {
  const debug = true;
  const endGroup = document.getElementById('endGroup');

  if(mode === "init"){
      let foundHREF = null;
      const occupiedHrefs = Array.from(endGroup.querySelectorAll('button'))
        .filter(btn => btn.id !== 'preBtn' && btn.id !== 'lastBtn')
        .map(btn => btn.dataset.href);

      if(debug) console.log("[reor][init] :", occupiedHrefs);

      if(occupiedHrefs.length==1){
        foundHREF = occupiedHrefs[0];
        if(debug) console.log("[reor][init] save prelast in endGroup [1]:", foundHREF);
      }else if(occupiedHrefs.length>1){
        foundHREF = occupiedHrefs[occupiedHrefs.length - 1];
        if(debug) console.log("[reor][init] save prelast in endGroup [n]:", foundHREF);
      }else {
        if(debug) console.log("[reor][init] nothing");
      }

      return foundHREF
  }

  if(mode === "fix"){

    let targetBtn = Array.from(buttonContainer.children).find(b => b.dataset.href === targetHREF);
    const allCurrentBtns = Array.from(buttonContainer.children).filter(b => b.tagName === 'BUTTON' && b !== endGroup);
    const lastVisibleBtn = allCurrentBtns[allCurrentBtns.length - 1];

    if(debug) console.log("[BEFEND]", lastVisibleBtn?.dataset.href, "[TARGET?]", targetBtn?.dataset.href);

    let fromRemoved = false;
    let replaced = false;

    if(!targetBtn){
      const originalToRestore = SOURCE_BUTTONS.find(s => s.dataset.href === targetHREF);
      
      if (originalToRestore) {
        targetBtn = originalToRestore.cloneNode(true);
        
        if (unlockHeart) {
          const g = targetBtn.dataset.g;
          if (g === "D" || g === "W" || g === "B") targetBtn.classList.add('dstate');
        }

        fromRemoved = true;
        if(debug) console.log("[reor][fix] Кнопка была удалена при перемешивании, добавляем", targetHREF);
      }
    }

    if (targetBtn && lastVisibleBtn && lastVisibleBtn !== targetBtn) {
      
      // Замена при условии что кнопка была удалена и заменяет заблокированные или те что что пользователь не сможет нажать
      if( fromRemoved && ( lastVisibleBtn.dataset.st === "lock" ||  ( unlockHeart && lastVisibleBtn.dataset.g === "W") ) ){
          lastVisibleBtn.replaceWith(targetBtn);

          if(debug) console.log("[reor][fix] replace:", targetHREF);
          replaced = true;

      }else{

        // Я думаю удалить lock кнопку из середины, и переставить target 
        // Потому что если он заменит живую ссылку на нашу кнопку - это плохо так как элементов мало
        
        buttonContainer.insertBefore(targetBtn, endGroup);
        
        const lockToSacrifice = Array.from(buttonContainer.querySelectorAll('button[data-st="lock"]'))
          .find(btn => btn !== targetBtn && !['firstBtn', 'obtn'].includes(btn.id) && !endGroup.contains(btn));

        if (lockToSacrifice) {
          lockToSacrifice.remove();
          if (debug) console.log("[reor][fix] moving");
          replaced = true
        }else{
          if (debug) console.log("[reor][fix] nothing change");
        }

      }

    }
    return replaced ? targetBtn : null;
  }
}

function rebuildGUI(mode = "update", shuffle = false) { 
  // modes reset/update

  const fixLogic = true;
  const debug = true;

  if(debug) console.log("[rebuildGUI] >>>>> START ");

  if(isMobile){
    checkWidescreen();
    const mobileCheck = isWideScreen ? ALBM_MOB_TRGT : PORT_MOB_TRGT;
    TEMP_TARGET_ROW = isMobile ? mobileCheck : DESK_TARGET_ROW;
  }


  const initLogic = (INIT_TARGET_ROW === TEMP_TARGET_ROW);

  // - Fix при поворотах (presolve)
  const ruleCallFix = (mode === "update" && INIT_TARGET_ROW != TEMP_TARGET_ROW);
  let targetHREF = null; if (fixLogic && ruleCallFix) targetHREF = reOrientFix("init");

  if(debug) console.log("[rebuildGUI] TEMP_TARGET_ROW", TEMP_TARGET_ROW, "RULE_CHANGE", ruleCallFix);

  // 1. Восстановление кнопок
  restoreSourceBtns(); 

  // 2. Обновление
  if ( shuffle ) shuffleButtonsWithRules();
  
  if (initLogic) removeOverflowBtnsUpdate();

  // - Fix при поворотах (postsolve)
  let replaced = null; if (fixLogic && ruleCallFix && !shuffle && targetHREF) replaced = reOrientFix("fix", targetHREF);

  // 3. Чистка нижней строки

  if(mode === "reset"){ // onstart
    
    if(!isMobile){  
      const endGroup = document.getElementById('endGroup');
      const prevBtn = endGroup.previousElementSibling;
      checkLastRowRef("force", prevBtn);

    } else{
      checkLastRowRef(); 
    }
  }else{ // on update

    if (fixLogic && targetHREF) {
      const forcedBtn = Array.from(buttonContainer.children).find(b => b.dataset.href === targetHREF);
      checkLastRowRef("force", forcedBtn);
    } else {
      checkLastRowRef();
    }
  }
  
  if (isMobile) fallbackMobileSnap();

  // 4. Обновление массива
  updSourceBtns(mode);

  if(debug && mode==="reset" ){
    const endGroup = document.getElementById('endGroup');
    const occupiedHrefs = Array.from(endGroup.querySelectorAll('button'))
      .filter(btn => btn.id !== 'preBtn' && btn.id !== 'lastBtn')
      .map(btn => btn.dataset.href);

    console.log("[rebuildGUI] result / hrefs in end :", JSON.parse(JSON.stringify(occupiedHrefs)));


    const endContent = Array.from(endGroup.querySelectorAll('button'))
        .filter(btn => !['preBtn', 'lastBtn'].includes(btn.id))
        .map(btn => `${btn.dataset.href}${btn.id ? `(id:${btn.id})` : ''}${btn.dataset.ghost === "true" ? '[G]' : ''}`)
        .join(' | ');

    console.log(`[END_GROUP] ${endContent || 'EMPTY'}`);
  }

  if(debug) console.log("[rebuildGUI] >>>>> END ");
}

function initPage() {
  console.log("InitPage / Mobile:", isMobile);

  if(isMobile){
    checkWidescreen();

  adjustFontByCount();

    window.addEventListener('touchstart', () => isTouching = true, {passive: true});
    window.addEventListener('touchend', () => isTouching = false, {passive: true});

    window.addEventListener('resize', () => {

    });
  }else{
    document.addEventListener("keydown", onKeyCommand); 

    window.addEventListener('focus', () => {
        console.log("Фокус вернулся");
    });
  }
}
