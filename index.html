[hidden] { display: none !important; }

/* 1. Main Geometry */
.fswrap {

justify-content: center; z-index: 1000;
}
.mobile .fswrap {
top: env(safe-area-inset-top, 0);

right: env(safe-area-inset-right, 0);
bottom: env(safe-area-inset-bottom, 0);
}

.mobile .fswrap.stickToBot {
align-items: flex-end;
padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
}


/* 2. Btns Geometry */
.btnsWrap {
display: flex; flex-wrap: wrap;
justify-content: space-between;
background: transparent;

/* Desktop */
width: min(90vw, 700px); height: min(90vh, 680px);
align-content: center; 
padding: 20px;
gap: 16px;
}

@media (max-width:420px){ /* Web Adapt */
  .btnsWrap { 
    padding:12px; 
    gap:10px; 
  }
}

.mobile .btnsWrap {
  width: auto; height: auto;
  align-content: normal;
  padding: max(12px, env(safe-area-inset-top))
           max(12px, env(safe-area-inset-right))
           max(12px, env(safe-area-inset-bottom))
           max(12px, env(safe-area-inset-left));
  gap: 10px; 
}

.endBtnWrapper {

  gap: inherit;

}

.mobile .endBtnWrapper { /* предохранитель */

}

/* 3. Buttons */
.btnsWrap button {

  padding:12px; font-size:1.25rem; color: gray; border: 0; cursor:pointer;
  transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color .6s ease;
  will-change: opacity, transform; z-index: 99; user-select: none; background: transparent;
}

@media (max-width:420px){ /* Web Adapt */
  .btnsWrap button { 
    padding:10px 14px; 
    font-size:1rem; 
  }
}

.mobile .btnsWrap button { 
  padding: 10px 14px; 
  font-size: 1rem; 
}

.btnsWrap button[data-st="lock"] { color: rgba(70,70,70,1.0); }

/* - Buttons Desktop Special */
@media (hover: hover) {
  .btnsWrap button:not([data-st="lock"]):hover { opacity: .5; }
  .btnsWrap button[data-st="lock"] { cursor: grab; }
  .btnsWrap button[data-st="lock"]:active {
    cursor: grabbing; transform: scale(0.99); color: rgba(50,50,50,1.0); 
  }
}

/* - Buttons by Groups (bd = dark, bw = white, bb = both) */
.btnsWrap button.bd, .btnsWrap button.bw, .btnsWrap button.bb {
  cursor: default; pointer-events: none;
}

/* - Buttons Base State */
.btnsWrap button.bd { color: rgba(128, 128, 128, 0); }
.btnsWrap button.bb, .btnsWrap button.bw { color: #9b9b9b; }

/* - Buttons Special */

/* - Buttons Active State */

<script>

const MOBILE_TARGET_ROW = 8;

let mergeFromCheck = false;
let completeHeart = false;      // Хранит состояние зоны (открыта/закрыта)
let switchZoneInAnim = false; // Блокирует спам-клики на 50мс

const buttonContainer = document.getElementById('mainButtons');

let SOURCE_BUTTONS = [];


// Замена static на sprite по готовности картинки
(function(id, src) {
  const img = new Image();
  img.src = src;
  // Ждем готовности картинки к отрисовке

    document.getElementById(id).classList.add('h_sprite');
  }).catch(() => { /* если картинка битая, останется SVG */ });

// ВОССТАНОВЛЕНИЕ ПОСЛЕ ВОЗВРАТА НАЗАД
window.addEventListener("pageshow", (event) => {
  if (event.persisted) {
    // только восстанавливаем видимость скрытых кнопок
    const buttons = Array.from(buttonContainer.querySelectorAll('button'));
    buttons.forEach(btn => {
      if(btn.classList.contains('btn_hide')){
        btn.classList.remove('btn_hide');
        btn.style.visibility = 'visible';
      }
    });
    buttonContainer.style.pointerEvents = "";
  }
});

/* ========== подстройка размера шрифта в зависимости от кол-ва кнопок ==========
   простая эвристика: чем больше кнопок — тем меньше шрифт (можно настроить под себя).
*/

function adjustFontByCount(){
  const buttons = Array.from(buttonContainer.querySelectorAll('button'));

  const n = buttons.length;
  //web - 4.6 
  const base = isMobile ? 4.4 : 4.6;
  const sizeRem = Math.max(0.9, base - (n - 3) * 0.12);
  buttons.forEach(b => b.style.fontSize = sizeRem + 'rem');
};

function removeDeskBtnOnMobile() {
  if (!isMobile) return;

  const container = document.getElementById('mainButtons');
  const btnsToRemove = container.querySelectorAll('button[data-mh="true"]');

  btnsToRemove.forEach(btn => {
    btn.remove();
  });
}

function getRowData(type = 'count') {
  //buttonContainer.offsetHeight; 
  const elements = Array.from(buttonContainer.children);
  if (!elements.length) return type === 'count' ? 0 : [];

  if (type === 'count') {
    return new Set(elements.map(el => el.offsetTop)).size;
  }
  if (type === 'items') {
    const lastTop = elements[elements.length - 1].offsetTop;
    return elements.filter(el => Math.abs(el.offsetTop - lastTop) < 5);
  }
}

function removeOverflowBtnsMobile() {
  if (!isMobile) return;
  const container = buttonContainer;

  let iteration = 0;
  while (getRowData('count') > MOBILE_TARGET_ROW) {
    iteration++;
    const currentRows = getRowData('count');
    const lockButtons = Array.from(container.querySelectorAll('button[data-st="lock"]'))
      .filter(btn => !['firstBtn', 'preBtn', 'lastBtn', 'obtn'].includes(btn.id));

    if (lockButtons.length === 0) {
      break;
    }

    let success = false;
    for (let j = lockButtons.length - 1; j >= 0; j--) {
      const btnToTry = lockButtons[j];
      const nextSibling = btnToTry.nextElementSibling;
      
      btnToTry.remove();
      const n = getRowData('count');

      if (n >= MOBILE_TARGET_ROW) {
        success = true;
        break; 
      } else {
        container.insertBefore(btnToTry, nextSibling);
      }
    }

    if (!success) {
      break;
    }
  }

  // Фикс односимвольных в нашем случае - слэш
  const endGroup = document.getElementById('endGroup');
  const obtn = document.getElementById('obtn');
  if (obtn && endGroup && obtn.nextElementSibling === endGroup) {
    const prevBtn = obtn.previousElementSibling;
    if (prevBtn && prevBtn.id !== 'firstBtn') {
      console.log("[Slash] move");
      container.insertBefore(obtn, prevBtn);
    }
  }
}

function checkLastRow() {
  const endGroup = document.getElementById('endGroup');

  function applyFix(items, mode = "mobile") {
    if (!endGroup || (mode === "mobile" && !isMobile)) return false;
    
    let targets = [];
    if (mode === "result") {
      targets = items.filter(el => el !== endGroup && el.id !== 'firstBtn' && el.id !== 'obtn');
    } else {
      targets = Array.from(buttonContainer.querySelectorAll('button'))
        .filter(btn => btn.id !== 'firstBtn' && btn.id !== 'obtn' && !endGroup.contains(btn) && btn.innerText.length > 2);
    }

    if (targets.length === 0){
      console.log("[Fix Failure] КАНДИДАТОВ НЕТ");
      return false;
    }

    // Режим MOBILE: работаем с одной кнопкой
    if (mode === "mobile") {
      targets.sort((a, b) => a.innerText.length - b.innerText.length);
      const bestBuddy = targets[0];
      const ghost = bestBuddy.cloneNode(true);
      ghost.id = ""; ghost.style.opacity = "0"; ghost.style.pointerEvents = "none";
      
      bestBuddy.parentNode.insertBefore(ghost, bestBuddy);
      endGroup.prepend(bestBuddy);
    } else { // Режим RESULT: работаем со всеми соседями
      [...targets].reverse().forEach(el => endGroup.prepend(el));
    }

    endGroup.style.flex = "1 0 100%"; 
    endGroup.style.marginLeft = "0";
    endGroup.style.justifyContent = "space-between";

    if(!isMobile) return true

    const currentCount = getRowData('count');

    if (currentCount !== MOBILE_TARGET_ROW) {
      console.log(`[Fix Failure] Нарушена сетка! Рядов: ${currentCount}. Откатываем...`);
      for (let j = 0; j < 3; j++) {
        const locks = Array.from(buttonContainer.querySelectorAll('button[data-st="lock"]'))
          .filter(btn => !['firstBtn', 'preBtn', 'lastBtn', 'obtn'].includes(btn.id) && !endGroup.contains(btn));
        
        if (locks.length > 0) {
          locks[locks.length - 1].remove();
          // Если после удаления всё встало на свои 8 строк
          if (getRowData('count') === MOBILE_TARGET_ROW) {
            console.log("[Успешно] Сетка восстановлена до 8 строк");
            return true;
          } 
        }
      }

      // Если удаление lock-кнопок выше не помогло:
      console.log("[Fix Failure] Не удалось спасти 8 строк. ОТКАТЫВАЕМ изменения.");
      const buddyInGroup = endGroup.querySelector('button:not(#preBtn):not(#lastBtn)');
      const ghost = Array.from(buttonContainer.children).find(el => el.style && el.style.opacity === "0");

      if (buddyInGroup && ghost) {
        ghost.replaceWith(buddyInGroup); 
        console.log(`[Rollback] Кнопка ${buddyInGroup.id} вернулась на базу.`);
      } else if (mode === "result") {
        // Добавляем .reverse(), чтобы вернуть кнопки в правильном порядке
        const neighbours = Array.from(endGroup.querySelectorAll('button:not(#preBtn):not(#lastBtn)'));
        neighbours.reverse().forEach(btn => buttonContainer.insertBefore(btn, endGroup));
      }

      // 3. СБРАСЫВАЕМ стили группы к дефолтным (как в CSS)
      endGroup.style.flex = "";
      endGroup.style.marginLeft = ""; 
      endGroup.style.justifyContent = "";

      return false; 
    }

    return true;
  }

  // Основная логика
  for (let i = 0; i < 3; i++) {
    const rowItems = getRowData('items'); 
    const n = rowItems.length; console.log("LastRowLength", n)
  
    if (n === 1) {
      if (isMobile && applyFix(rowItems, "mobile")){
        mergeFromCheck = true;
        break;
      } 

      const lockButtons = Array.from(buttonContainer.querySelectorAll('button[data-st="lock"]'))
        .filter(btn => !['preBtn', 'lastBtn', 'firstBtn', 'obtn'].includes(btn.id) && !endGroup.contains(btn));

      if (lockButtons.length === 0) {
        applyFix(rowItems, "result");
        break;
      }
      
      lockButtons[lockButtons.length - 1].remove();
      buttonContainer.offsetHeight;

    } else {
      applyFix(rowItems, "result");
      break;
    }
  }
}


function shuffleButtonsWithRules() {
  const container = buttonContainer;
  const firstBtn = document.getElementById('firstBtn');
  const endGroup = document.getElementById('endGroup');

  // Берем ВСЕ кнопки, которые НЕ входят в "неприкосновенные"
  const allBtns = Array.from(container.querySelectorAll('button'));
  const rest = allBtns.filter(b => b !== firstBtn && !endGroup.contains(b));

  const excl = rest.filter(b => b.dataset.href === "/const");

  if (rest.length === 0) return;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  let valid = false;
  while (!valid) {
    shuffle(rest);
    valid = !excl.includes(rest[rest.length - 1]);
  }

  // Пересобираем контейнер
  //container.innerHTML = "";

  container.appendChild(firstBtn);
  rest.forEach(btn => container.appendChild(btn));
  container.appendChild(endGroup); // Вставляем группу целиком
}

  if (switchZoneInAnim) return; 
  switchZoneInAnim = true;

  const sprite = document.getElementById('heartIcon');
  const bContainer = document.getElementById('mainButtons');
  
  const delayIcon = 50;
  const delayStyles = 0; 
  const delayText = 500;

  const firstBtn =  document.getElementById('firstBtn');

  if (state === "open") {
      firstBtn.dataset.href = "/identity"
      //firstBtn.dataset.g = "D"
      //firstBtn.classList.replace('bw', 'bd');
      //firstBtn.textContent = "\u00A0";
  } else {
      firstBtn.dataset.href = "/wolume"
      //firstBtn.dataset.g = "W"
      //firstBtn.textContent = "\u00A0";
      //firstBtn.classList.replace('bd', 'bw');
  }

  // Используем прямые команды вместо toggle
  // исключает риск рассинхрона стейта при спам-кликах
  setTimeout(() => {
    if (state === "open") {
      sprite.classList.add('complete');
    } else {
      sprite.classList.remove('complete');
    }
    switchZoneInAnim = false;
  }, delayIcon);

  const dButtons = Array.from(bContainer.querySelectorAll('button[data-g="D"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const wButtons = Array.from(bContainer.querySelectorAll('button[data-g="W"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const bButtons = Array.from(bContainer.querySelectorAll('button[data-g="B"]'))
    .filter(btn => btn.id !== 'lastBtn');


  if (state === "open") {
    setTimeout(() => {
      document.body.classList.add("invert");
      
      setTimeout(() => {
        //firstBtn.textContent = "*";
      }, delayText);

      dButtons.forEach(b => b.classList.add('dOpen'));
      wButtons.forEach(b => b.classList.add('wLock'));
      bButtons.forEach(b => b.classList.add('bLock'));

    }, delayStyles);
  
  } else {
    setTimeout(() => {
      document.body.classList.remove("invert");
      
      setTimeout(() => {
        //firstBtn.textContent = "~";
      }, delayText);

      dButtons.forEach(b => b.classList.remove('dOpen'));
      wButtons.forEach(b => b.classList.remove('wLock'));
      bButtons.forEach(b => b.classList.remove('bLock'));
    }, delayStyles);
  
  }
}

function hideAllButtons() {
  return new Promise(resolve => {
    let finished = 0;
    const buttons = Array.from(buttonContainer.querySelectorAll('button'));

    const total = buttons.length;

    function onTransitionEnd(e) {
      if (e.propertyName !== 'opacity') return;
      finished++;
      if (finished >= total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }

    function cleanup(){
      buttons.forEach(btn => btn.removeEventListener('transitionend', onTransitionEnd));
    }

    // привязываем слушатель И запускаем анимацию скрытия
    buttons.forEach(btn => btn.addEventListener('transitionend', onTransitionEnd));
    // небольшая задержка, чтобы гарантировано применился класс и началась анимация
    requestAnimationFrame(() => {
      buttons.forEach(btn => btn.classList.add('btn_hide'));
    });

    // safety fallback — если transitionend не сработает, через 1.2s всё равно продолжим
    setTimeout(() => {
      if (finished < total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }, 1400);
  });
}

async function handleButtonClick(ev) {

  const btn = ev.target.closest('button');
  if (!btn) return;

  ev.preventDefault();

  // 2. Логика СЕРДЦА
  if (btn.id === 'lastBtn') {
    completeHeart = !completeHeart;
    if (typeof changeZone === "function") changeZone(completeHeart ? "open" : "lock");
    return;
  }

  // 3. ПРЕРЫВАЕМ для кнопок в статусе lock или с классом wLock
  if (btn.dataset.st === 'lock' || btn.classList.contains('wLock')) {
    return false;
  }

  // 4. ЛОГИКА ПЕРЕХОДА
  let target = btn.dataset.href || '#';

  // Блокируем контейнер от повторных кликов
  buttonContainer.style.pointerEvents = 'none';
  
  // Анимация скрытия всех кнопок
  await hideAllButtons();

  // Формирование URL (твой оригинальный алгоритм)
  if (window.location.protocol === "file:") {
    if (target.startsWith("/")) target = target.slice(1);
    target = target + ".html";
  } else {
    if (target.endsWith(".html")) {
      target = "/" + target.replace(".html", "");
    }
  }

  if (isMobile && btn.dataset.mb === 'true') {
    target = "/ios" + target + "/";
  }
  if (isMobile) {
    target = target + "/";
  }

  window.location.href = target;
}

function restoreSourceBtns(select_btns) {
  const container = document.getElementById('mainButtons');
  const firstBtn = document.getElementById('firstBtn');
  const endGroup = document.getElementById('endGroup');

  mergeFromCheck = false;
  container.innerHTML = "";
  
  // 1. Восстанавливаем первую кнопку с учетом стейта
  const fClone = firstBtn.cloneNode(true);
  fClone.dataset.href = completeHeart ? "/identity" : "/wolume";
  container.appendChild(fClone);

  // 2. Восстанавливаем остальные кнопки
  select_btns.forEach(btn => {
    if (!['firstBtn', 'preBtn', 'lastBtn'].includes(btn.id)) {
      const clone = btn.cloneNode(true);
      
      // СИНХРОНИЗАЦИЯ СОСТОЯНИЯ ЗОНЫ
      const group = clone.dataset.g;
      if (completeHeart) {
        // Если зона открыта ("open")
        if (group === "D") clone.classList.add('dOpen');
        if (group === "W") clone.classList.add('wLock');
        if (group === "B") clone.classList.add('bLock');
      } else {
        // Если зона закрыта ("lock") — просто убеждаемся, что классов нет 
        // (хотя в SOURCE их и так быть не должно)
        clone.classList.remove('dOpen', 'wLock', 'bLock');
      }

      container.appendChild(clone);
    }
  });

  container.appendChild(endGroup);

  // Синхронизация спрайта сердца (так как endGroup не клонируется, а переносится)
  const sprite = document.getElementById('heartIcon');
  if (completeHeart) sprite.classList.add('complete');
  else sprite.classList.remove('complete');

  // Сброс стилей группы
  endGroup.style.flex = ""; 
  endGroup.style.marginLeft = ""; 
  endGroup.style.justifyContent = "";
}



function rebuildGUI(shuffle = false) {
  restoreSourceBtns(SOURCE_BUTTONS);

  if (shuffle) {
    shuffleButtonsWithRules();
    const container = document.getElementById('mainButtons');
    SOURCE_BUTTONS = Array.from(container.querySelectorAll('button')).map(btn => btn.cloneNode(true));
  }else{

  }

  removeOverflowBtnsMobile();
  checkLastRow(); 
}


function initSourceButtons() {
  const buttonContainer = document.getElementById('mainButtons');

  SOURCE_BUTTONS = Array.from(buttonContainer.querySelectorAll('button')).map(btn => btn.cloneNode(true));

  buttonContainer.addEventListener('click', handleButtonClick);
}

let resizeTimeout; // Объявляем переменную здесь

function initPage() {
  console.log("InitPage / Mobile:", isMobile);

  // Prepare
  removeDeskBtnOnMobile();
  adjustFontByCount();
  initSourceButtons();

  // Rebuild
  rebuildGUI(true);

  // Events
  if(isMobile){
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        rebuildGUI(false); 
      }, 200);
    });
  }else{
    document.addEventListener("keydown", onKeyCommand); 

    window.addEventListener('focus', () => {
        console.log("Фокус вернулся");
    });
  }

}

// Init Block
initPage();
