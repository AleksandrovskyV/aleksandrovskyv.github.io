<style>
*{box-sizing:border-box;margin:0;padding:0}
html, body {
  height: 100%; background: #e5e5e5;
  transition: background-color 0.8s ease;
}
body.invert{background: #000;}

[hidden] { display: none !important; }

/* 1. Main Geometry */
.fswrap {
position: fixed; inset: 0;
display: flex; align-items: center;
justify-content: center; z-index: 1000;
}
.mobile .fswrap {
top: env(safe-area-inset-top, 0);
left: env(safe-area-inset-left, 0);
right: env(safe-area-inset-right, 0);
bottom: env(safe-area-inset-bottom, 0);
}

/* 2. Btns Geometry */
.btnsWrap {
display: flex; flex-wrap: wrap;
justify-content: space-between;
background: transparent;

/* Desktop */
width: min(90vw, 700px); height: min(90vh, 680px);
align-content: center; 
padding: 20px;
gap: 16px;
}

@media (max-width:420px){ /* Web Adapt */
  .btnsWrap { 
    padding:12px; 
    gap:10px; 
  }
}

.mobile .btnsWrap {
  width: auto; height: auto;
  align-content: normal;
  padding: max(12px, env(safe-area-inset-top))
           max(12px, env(safe-area-inset-right))
           max(12px, env(safe-area-inset-bottom))
           max(12px, env(safe-area-inset-left));
  gap: 10px; 
}

.endBtnWrapper {
  display: inline-flex;
  gap: inherit; 
  flex: 0 0 auto;
  margin-left: auto; /* Это прижмет группу вправо, если в строке есть место */
}

/* 3. Buttons */
.btnsWrap button {
  flex: 0 0 auto; display:inline-flex; align-items:center; justify-content:center;
  padding:12px; font-size:1.25rem; color: gray; border: 0; cursor:pointer;
  transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color .6s ease;
  will-change: opacity, transform; z-index: 99; user-select: none; background: transparent;
}

@media (max-width:420px){ /* Web Adapt */
  .btnsWrap button { 
    padding:10px 14px; 
    font-size:1rem; 
  }
}

.mobile .btnsWrap button { 
  padding: 10px 14px; 
  font-size: 1rem; 
}

.btnsWrap button[data-st="lock"] { color: rgba(70,70,70,1.0); }

/* - Buttons Desktop Special */
@media (hover: hover) {
  .btnsWrap button:not([data-st="lock"]):hover { opacity: .5; }
  .btnsWrap button[data-st="lock"] { cursor: grab; }
  .btnsWrap button[data-st="lock"]:active {
    cursor: grabbing; transform: scale(0.99); color: rgba(50,50,50,1.0); 
  }
}

/* - Buttons by Groups (bd = dark, bw = white, bb = both) */
.btnsWrap button.bd, .btnsWrap button.bw, .btnsWrap button.bb {
  cursor: default; pointer-events: none;
}

/* - Buttons Base State */
.btnsWrap button.bd { color: rgba(128, 128, 128, 0); }
.btnsWrap button.bb, .btnsWrap button.bw { color: #9b9b9b; }

/* - Buttons Special */
.btnsWrap button.bb { transition: color 0.6s ease; }

.btnsWrap button.bw:not([data-st="lock"]){
  pointer-events: auto; cursor: pointer; 
}

/* - Buttons Active State */
.btnsWrap button.bd.dOpen {
  pointer-events: auto; cursor: pointer; color: rgba(128, 128, 128, 1);
  transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color 1.6s ;
}
.btnsWrap button.bw.wLock, .btnsWrap button.bb.bLock {
  pointer-events: auto; cursor: grab; color: rgba(70,70,70,1.0);
}
.btnsWrap button.bw.wLock:active, .btnsWrap button.bb.bLock:active {
  cursor: grabbing; transform: scale(0.99); color: rgba(50,50,50,1.0); 
}
.btn_hide { opacity: 0 !important; pointer-events: none !important; }

/* 3. Heart Sprite */
/* base64-image.de */
.h_icon { display: block; margin: 5px auto 0; width: 88px; height: 42px; }
.h_sprite {
  background: url("/content/heart_sprite.png") no-repeat 0 0;
  background-size: 100% auto;
  transition: background-position 0.4s steps(19);
  will-change: background-position;
}
.h_sprite svg { display: none; }
.h_sprite.complete { background-position: 0 100%; }

<script>

const buttonContainer = document.getElementById('mainButtons');

// Замена static на sprite по готовности картинки
(function(id, src) {
  const img = new Image();
  img.src = src;
  // Ждем готовности картинки к отрисовке
  img.decode().then(() => {
    document.getElementById(id).classList.add('h_sprite');
  }).catch(() => { /* если картинка битая, останется SVG */ });
})('heartIcon', "/content/heart_sprite.png");

// ВОССТАНОВЛЕНИЕ ПОСЛЕ ВОЗВРАТА НАЗАД
window.addEventListener("pageshow", (event) => {
  if (event.persisted) {
    // только восстанавливаем видимость скрытых кнопок
    const buttons = Array.from(buttonContainer.querySelectorAll('button'));
    buttons.forEach(btn => {
      if(btn.classList.contains('btn_hide')){
        btn.classList.remove('btn_hide');
        btn.style.visibility = 'visible';
      }
    });
    buttonContainer.style.pointerEvents = "";
  }
});

function debugOffsets() {
  const btns = document.getElementById('mainButtons').children;
  if (btns.length < 2) return console.log("Недостаточно кнопок");

  const last = btns[btns.length - 1];
  const preLast = btns[btns.length - 2];

  console.log({
    last: {
      tag: last.dataset.href || 'no-href',
      offset: last.offsetTop,
      height: last.offsetHeight
    },
    preLast: {
      tag: preLast.dataset.href || 'no-href',
      offset: preLast.offsetTop,
      height: preLast.offsetHeight
    },
    diff: Math.abs(last.offsetTop - preLast.offsetTop)
  });
}

/* ========== подстройка размера шрифта в зависимости от кол-ва кнопок ==========
   простая эвристика: чем больше кнопок — тем меньше шрифт (можно настроить под себя).
*/

function adjustFontByCount(){
  const buttons = Array.from(buttonContainer.querySelectorAll('button'));

  const n = buttons.length;
  //web - 4.6 
  const base = isMobile ? 4.4 : 4.6;
  const sizeRem = Math.max(0.9, base - (n - 3) * 0.12);
  buttons.forEach(b => b.style.fontSize = sizeRem + 'rem');
};

function removeDeskBtnOnMobile() {
  if (!isMobile) return;

  const container = document.getElementById('mainButtons');
  const btnsToRemove = container.querySelectorAll('button[data-mh="true"]');

  btnsToRemove.forEach(btn => {
    btn.remove();
  });
}

function removeOverflowLockBtns() {
  // удаление lock кнопок для мобильной
  const mainWrapper = document.getElementById('mainWrapper');
  const container = buttonContainer;
  const maxHeight = mainWrapper.clientHeight;

  while (container.scrollHeight > maxHeight) {
    const lockButtons = Array.from(container.querySelectorAll('button[data-st="lock"]'))
      .filter(btn => btn.id !== 'firstBtn' && btn.id !== 'preBtn' && btn.id !== 'lastBtn');

    if (lockButtons.length === 0) break;

    // Удаляем последнюю подходящую кнопку
    const btnToRemove = lockButtons.pop();
    // ЗАМЕНА: .remove() вместо removeChild
    btnToRemove.remove(); 
  }
}

function hideAllButtons() {
  return new Promise(resolve => {
    let finished = 0;
    const buttons = Array.from(buttonContainer.querySelectorAll('button'));

    const total = buttons.length;

    function onTransitionEnd(e) {
      if (e.propertyName !== 'opacity') return;
      finished++;
      if (finished >= total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }

    function cleanup(){
      buttons.forEach(btn => btn.removeEventListener('transitionend', onTransitionEnd));
    }

    // привязываем слушатель И запускаем анимацию скрытия
    buttons.forEach(btn => btn.addEventListener('transitionend', onTransitionEnd));
    // небольшая задержка, чтобы гарантировано применился класс и началась анимация
    requestAnimationFrame(() => {
      buttons.forEach(btn => btn.classList.add('btn_hide'));
    });

    // safety fallback — если transitionend не сработает, через 1.2s всё равно продолжим
    setTimeout(() => {
      if (finished < total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }, 1400);
  });
}

function getLastRowInfoOld() {
  const btns = Array.from(buttonContainer.children);
  if (!btns.length) return 0;

  //debugOffsets();

  const lastTop = btns[btns.length - 1].offsetTop;
  const lastRowBtns = btns.filter(btn => btn.offsetTop === lastTop);

  console.log(`На последней строке: ${lastRowBtns.length}`);
  return lastRowBtns.length;
}


function getLastRowInfo() {
  const elements = Array.from(buttonContainer.children); 
  if (!elements.length) return 0;


  const lastTop = elements[elements.length - 1].offsetTop;
  const lastRowItems = elements.filter(el => Math.abs(el.offsetTop - lastTop) < 5);
  
  console.log(`Объектов на строке: ${lastRowItems.length}`);
  return lastRowItems.length;
}

function checkLastRow() {
  // Максимум 3 попытки, чтобы не уйти в бесконечность
  for (let i = 0; i < 3; i++) {
    const n = getLastRowInfo();
    
    // Если в хвосте 1 или 2 кнопки — чистим
    if (n === 1) {
      const lockButtons = Array.from(buttonContainer.querySelectorAll('button[data-st="lock"]'))
        .filter(btn => btn.id !== 'preBtn' && btn.id !== 'lastBtn');

      if (lockButtons.length === 0) break;

      lockButtons[lockButtons.length - 1].remove();
    } else {
      break;
    }
  }
}

function shuffleButtonsWithRules() {
  const container = buttonContainer;
  const firstBtn = document.getElementById('firstBtn');
  const endGroup = document.getElementById('endGroup'); // Цепляем группу
  
  // Берем ВСЕ кнопки, которые НЕ входят в "неприкосновенные"
  const allBtns = Array.from(container.querySelectorAll('button'));
  const rest = allBtns.filter(b => b !== firstBtn && !endGroup.contains(b));

  const excl = rest.filter(b => b.dataset.href === "/const");

  if (rest.length === 0) return;

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  let valid = false;
  while (!valid) {
    shuffle(rest);
    valid = !excl.includes(rest[rest.length - 1]);
  }

  // Пересобираем контейнер
  container.innerHTML = "";
  container.appendChild(firstBtn);
  rest.forEach(btn => container.appendChild(btn));
  container.appendChild(endGroup); // Вставляем группу целиком
}

let isFull = false;      // Хранит состояние зоны (открыта/закрыта)
let isAnimating = false; // Блокирует спам-клики на 50мс

function changeZone(state = "open") {

  if (isAnimating) return; 
  isAnimating = true;

  const sprite = document.getElementById('heartIcon');
  const bContainer = document.getElementById('mainButtons');
  
  const delayIcon = 50;
  const delayStyles = 0; 
  const delayText = 500;

  const firstBtn =  document.getElementById('firstBtn');

  if (state === "open") {
      firstBtn.dataset.href = "/identity"
      //firstBtn.dataset.g = "D"
      //firstBtn.classList.replace('bw', 'bd');
      //firstBtn.textContent = "\u00A0";
  } else {
      firstBtn.dataset.href = "/wolume"
      //firstBtn.dataset.g = "W"
      //firstBtn.textContent = "\u00A0";
      //firstBtn.classList.replace('bd', 'bw');
  }

  // Используем прямые команды вместо toggle
  // исключает риск рассинхрона стейта при спам-кликах
  setTimeout(() => {
    if (state === "open") {
      sprite.classList.add('complete');
    } else {
      sprite.classList.remove('complete');
    }
    isAnimating = false;
  }, delayIcon);

  const dButtons = Array.from(bContainer.querySelectorAll('button[data-g="D"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const wButtons = Array.from(bContainer.querySelectorAll('button[data-g="W"]'))
    .filter(btn => btn.id !== 'lastBtn');

  const bButtons = Array.from(bContainer.querySelectorAll('button[data-g="B"]'))
    .filter(btn => btn.id !== 'lastBtn');


  if (state === "open") {
    setTimeout(() => {
      document.body.classList.add("invert");
      
      setTimeout(() => {
        //firstBtn.textContent = "*";
      }, delayText);

      dButtons.forEach(b => b.classList.add('dOpen'));
      wButtons.forEach(b => b.classList.add('wLock'));
      bButtons.forEach(b => b.classList.add('bLock'));

    }, delayStyles);
  
  } else {
    setTimeout(() => {
      document.body.classList.remove("invert");
      
      setTimeout(() => {
        //firstBtn.textContent = "~";
      }, delayText);

      dButtons.forEach(b => b.classList.remove('dOpen'));
      wButtons.forEach(b => b.classList.remove('wLock'));
      bButtons.forEach(b => b.classList.remove('bLock'));
    }, delayStyles);
  
  }
}

function onKeyCommand(e) {

  console.log("Press", e.code);
  e.preventDefault();
  e.stopImmediatePropagation(); // Чтобы другие скрипты не мешали

  if (e.code === "Backquote") {
    if (window.location.protocol === "file:") {
      window.location.href = "./wolume/index.html";
    } else {
      window.location.href = "./wolume";
    }
  }

  if (e.code === 'KeyE') {
    if (window.location.protocol === "file:") {
      window.location.href = "./exegesis/index.html";
    } else {
      window.location.href = "./exegesis";
    }
  }

  if (e.code === 'KeyR') {
    if (window.location.protocol === "file:") {
      window.location.href = "./renders/index.html";
    } else {
      window.location.href = "./renders";
    }
  }

  if (e.code === 'KeyG') {
    if (window.location.protocol === "file:") {
      window.location.href = "./графика/index.html";
    } else {
      window.location.href = "./графика";
    }
  }

  if (e.code === 'KeyH') {
    if (window.location.protocol === "file:") {
      window.location.href = "./негативы/index.html";
    } else {
      window.location.href = "./негативы";
    }
  }

  return
}

function connectActionsToBtns(){
  const buttons = Array.from(buttonContainer.querySelectorAll('button'));

  buttons.forEach(btn => {
    btn.addEventListener('click', async (ev) => {
      
      const lastBtn = document.getElementById('lastBtn');
      if (btn.id === 'lastBtn') {
          ev.preventDefault();
          isFull = !isFull;
          if (typeof changeZone === "function") changeZone(isFull ? "open" : "lock");
          return;
      }

      // прерываем для кнопок в статусе lock 
      if (btn.dataset.st === 'lock') {
        ev.preventDefault();
        return false;
      }

      if ( btn.classList.contains('wLock') ) {//|| btn.classList.contains('bLock')
        ev.preventDefault();
        return false;
      }

      // Для остальных кнопок
      let target = btn.dataset.href || '#';

      ev.preventDefault();
      buttonContainer.style.pointerEvents = 'none';
      await hideAllButtons();

      if (window.location.protocol === "file:") {
        // локальная отладка
        if (target.startsWith("/")) target = target.slice(1);
        target = target + ".html";
      } else {
        // сервер
        if (target.endsWith(".html")) {
          target = "/" + target.replace(".html", "");
        }
      }

      if (isMobile && btn.dataset.mb === 'true') {
        target = "/ios" + target + "/";
      }
      if (isMobile) {
        target = target + "/";
      }
    
      window.location.href = target;

    });
  });
}

function initPage() {

  console.log("isMobile?", isMobile);

  if (isMobile) removeDeskBtnOnMobile();

  adjustFontByCount();
  shuffleButtonsWithRules();
  if (isMobile) removeOverflowLockBtns();

  if (!isMobile) checkLastRow();

  connectActionsToBtns();

  document.addEventListener("keydown", onKeyCommand);

  window.addEventListener('focus', () => {
      console.log("Фокус вернулся");
  });
}

// Init Block
initPage();

</script>
