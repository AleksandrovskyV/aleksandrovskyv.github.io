<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html, body {
    height: 100%;
    background: #e5e5e5;
    margin: 0;
    padding: 0;
    transition: background-color 0.7s ease-out;
  }

  body.switchZone{
    background: #000;
  }

  /* Классы для Desktop */

  .overlay{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
  }

  .buttonblock{
    display:flex;
    flex-wrap:wrap;           
    gap:16px;
    width: min(90vw, 700px);
    height: min(90vh, 680px);
    align-content:center;
    justify-content: space-between; 
    padding:20px;
    background:transparent;
  }

  .buttonblock button,
  .buttonblockMobile button{
    flex: 0 0 auto;  
    display:inline-flex;
    align-items:center;
    justify-content:center;
    padding:12px 12px;
    font-size:1.25rem;
    color: gray;
    background: rgba(0,0,0,0.0);
    border: 0;
    cursor:pointer;
    transition: opacity .6s ease, transform .45s cubic-bezier(.2,.9,.2,1), color .6s ease;
    will-change: opacity, transform;
    z-index: 99;

    -webkit-user-select: none;
    user-select: none;

  }

  /* Общее для всех */
  .buttonblock button[data-state="close"],
  .buttonblockMobile button[data-state="close"] {
    color: rgba(70,70,70,1.0);
  }

  /* 3. ЭФФЕКТЫ ТОЛЬКО ДЛЯ ПК (с мышкой) */
  @media (hover: hover) {
    .buttonblock button:not([data-state="close"]):hover,
    .buttonblockMobile button:not([data-state="close"]):hover {
      opacity: .5;
    }

    .buttonblock button[data-state="close"] {
      cursor: grab;
    }

    .buttonblock button[data-state="close"]:active {
      cursor: grabbing;
      transform: scale(0.99); 
      color: rgba(50,50,50,1.0); 
    }
  }

  .buttonblock button.bb,
  .buttonblockMobile button.bb {
    cursor: default;
    pointer-events: none;
    color: #9b9b9b;
  }

  .buttonblock button.bd,
  .buttonblockMobile button.bd {
    cursor: default;
    pointer-events: none;
    transition: opacity .6s ease, 
                transform .45s cubic-bezier(.2,.9,.2,1), 
                color 0.6s ease; /* дефолтный изинг */
    color: rgba(128, 128, 128, 0); 
  }

  .buttonblock button.bd.dOpen,
  .buttonblockMobile button.bd.dOpen {
    pointer-events: auto;
    cursor: pointer;
    transition: opacity .6s ease, 
                transform .45s cubic-bezier(.2,.9,.2,1), 
                color 0.9s ease-out;

    color: rgba(128, 128, 128, 1); 
  }

  .buttonblock button.bw,
  .buttonblockMobile button.bw {
    pointer-events: none;
    transition: opacity .6s ease, 
                transform .45s cubic-bezier(.2,.9,.2,1), 
                color 0.6s ease; /* дефолтный изинг */
    color: #9b9b9b;
  }

  .buttonblock button.bw.wLock,
  .buttonblockMobile button.bw.wLock {
    pointer-events: auto;
    transition: opacity .6s ease, 
                transform .45s cubic-bezier(.2,.9,.2,1), 
                color 0.6s ease;
    color: rgba(70,70,70,1.0);
  }

  .heart-sprite {
      display: block;
      margin: 0 auto;
      width: 88px;
      height: 42px;
      margin-top: 5px;
      
      background-image: url("./content/heart_sprite.png");
      background-repeat: no-repeat;
      background-size: 100% auto;
      background-position: 0 0;
      transition: background-position 0.4s steps(19); /* ~ 50 fps*/
      
      pointer-events: none;
      will-change: background-position;
  }

  .heart-sprite.is-full {
      background-position: 0 100%; /* Прыжок в конец ленты */
  }

  /* Классы для мобильной */

  .overlayMobile{
    position: fixed;

    top: env(safe-area-inset-top, 0);
    left: env(safe-area-inset-left, 0);
    right: env(safe-area-inset-right, 0);
    bottom: env(safe-area-inset-bottom, 0);
    
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }

  .buttonblockMobile{
    padding: env(safe-area-inset-top, 12px)
             env(safe-area-inset-right, 12px)
             env(safe-area-inset-bottom, 12px)
             env(safe-area-inset-left, 12px);

    display:flex;
    flex-wrap:wrap;
    gap:16px;
    justify-content: space-between;
    background:transparent;
  }

  .hidden-btn{
    opacity: 0 !important;
    pointer-events: none !important;
  }

  /* маленькие устройства — уменьшаем отступ и шрифт */
  @media (max-width:420px){
    .buttonblock,
    .buttonblockMobile {
      gap:10px;
      padding:12px;
    }

    .buttonblock button,
    .buttonblockMobile button{
      padding:10px 14px;
      font-size:1rem;
    }
  }

<body>

<div class="overlay" id="mOverlay">
  <div class="buttonblock" id="mButtonsContainer"> 

    <button id="startW" class="bw" data-z="W" data-href="/identity" data-state="close" data-mobile="false" >identity</button>
    <button id="startD" class="bd" data-z="D" data-href="/wolume"   data-state="open"  data-mobile="false" >~</button>

    <!-- mobile special -->
    <button data-href="/chat"     class="bd" data-z="D" data-state="open"  data-mobile="true" >chat___</button>
    <button data-href="/день"     class="bd" data-z="D" data-state="open"  data-mobile="true" >день</button>
    <button data-href="/триптих"  class="bd" data-z="D" data-state="open"  data-mobile="true" >триптих</button>

    <!-- combine between web and mobile  -->
    <button data-href="/негативы" class="bd" data-z="D" data-state="open"  data-mobile="false" >негативы</button>
    <button data-href="/exegesis" class="bd" data-z="D" data-state="open"  data-mobile="false" >.exe</button>

    <button data-href="/renders"  class="bw" data-z="W" data-state="close" data-mobile="false" >_enders</button>
    <button data-href="/снимки"   class="bw" data-z="W" data-state="close" data-mobile="false" >снимки</button>
    <button data-href="/графика"  class="bw" data-z="W" data-state="close" data-mobile="false" >графика</button>
  
    <button data-href="/bread"    class="bw" data-z="W" data-state="close" data-mobile="false" >bread</button>
    <button data-href="/haloguys" class="bw" data-z="W" data-state="close" data-mobile="false" >[ haloguys ]</button>
    <button data-href="/покпокки" class="bw" data-z="W" data-state="close" data-mobile="false" >покпокки</button>
  
    <button data-href="/работа"   class="bw" data-z="W" data-state="close" data-mobile="false" >работа</button>
    <button data-href="/process"  class="bw" data-z="W" data-state="close" data-mobile="false" >_cess</button>

    <button data-href="/const"    class="bb" data-z="B" data-state="close" data-mobile="false" >/</button>

    <!-- disable on mobile -->

    <button data-href="/fe"       class="bd" data-z="D" data-state="open" data-mobile="false" data-mhidden="true" >fe</button>
    <button data-href="/flipbook" class="bd" data-z="D" data-state="open" data-mobile="false" data-mhidden="true" >flipbook</button>

    <!-- end block -->

    <button id="endSpace"  class="bb" data-z="B" data-href="/space" data-state="close" data-mobile="false" >—</button>
    
     <!--   <button data-href="/aboutOld"    data-state="close" data-mobile="false" >[ &hearts; ]</button>-->

     <!-- логика с гиф была полностью убрана, так как заставить её работать без перезагрузки в Safari никак   -->
    <button id="endHeart" data-href="/about" data-state="open">
        <div id="heartIcon" class="heart-sprite"></div>
    </button>

  </div>
</div>

<script>


const debugMode = false

const ua = navigator.userAgent.toLowerCase();
const isMobile = /iphone|ipad|android/.test(ua);

const overlay = document.getElementById('mOverlay');
const buttonContainer = document.getElementById('mButtonsContainer');

const buttons = Array.from(buttonContainer.querySelectorAll('button'));
const heart = buttons.find(b => b.dataset.href === "/about");

if (!isMobile) {
  // замена на изображение
  //heart.textContent = '[ ❤ ]'; // теперь у нас png+gif
} else {
  overlay.classList.replace('overlay', 'overlayMobile');
  buttonContainer.classList.replace('buttonblock', 'buttonblockMobile');
}
  
// ВОССТАНОВЛЕНИЕ ПОСЛЕ ВОЗВРАТА НАЗАД
window.addEventListener("pageshow", (event) => {
  if (event.persisted) {
    // только восстанавливаем видимость скрытых кнопок
    buttons.forEach(btn => {
      if(btn.classList.contains('hidden-btn')){
        btn.classList.remove('hidden-btn');
        btn.style.visibility = 'visible';
      }
    });
    buttonContainer.style.pointerEvents = "";
  }
});

function debugOffsets() {
  const btns = document.getElementById('mButtonsContainer').children;
  if (btns.length < 2) return console.log("Недостаточно кнопок");

  const last = btns[btns.length - 1];
  const preLast = btns[btns.length - 2];

  console.log({
    last: {
      tag: last.dataset.href || 'no-href',
      offset: last.offsetTop,
      height: last.offsetHeight
    },
    preLast: {
      tag: preLast.dataset.href || 'no-href',
      offset: preLast.offsetTop,
      height: preLast.offsetHeight
    },
    diff: Math.abs(last.offsetTop - preLast.offsetTop)
  });
}

/* ========== Автоматическая подстройка размера шрифта в зависимости от кол-ва кнопок ==========
   простая эвристика: чем больше кнопок — тем меньше шрифт (можно настроить под себя).
*/

function adjustFontByCount(){
  const n = buttons.length;

  //web - 4.6 
  const base = isMobile ? 4.4 : 4.6;
  const sizeRem = Math.max(0.9, base - (n - 3) * 0.12);
  buttons.forEach(b => b.style.fontSize = sizeRem + 'rem');
};

function removeBtnsOnMobile() {
  if (!isMobile) return;

  const container = document.getElementById('mButtonsContainer');
  const btnsToRemove = container.querySelectorAll('button[data-mhidden="true"]');

  btnsToRemove.forEach(btn => {
    btn.remove();
  });
}

function removeOverflowingCloseButtons() {
  // метод удаления кнопок в мобильной версии

  const container = buttonContainer;
  const maxHeight = overlay.clientHeight;


  // Пока контент не помещается
  while (container.scrollHeight > maxHeight) {
    // Берём все кнопки close, кроме исключений

    const closeButtons = Array.from(container.querySelectorAll('button[data-state="close"]'))
      .filter(btn => btn.dataset.href !== '/space' && btn.dataset.href !== '/about');

    if (closeButtons.length === 0) break; // Больше нечего удалять

    // Удаляем последнюю подходящую кнопку
    const btnToRemove = closeButtons.pop();
    container.removeChild(btnToRemove);
  }
}

function hideAllButtons() {
  return new Promise(resolve => {
    let finished = 0;
    const total = buttons.length;

    function onTransitionEnd(e) {
      if (e.propertyName !== 'opacity') return;
      finished++;
      if (finished >= total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }

    function cleanup(){
      buttons.forEach(btn => btn.removeEventListener('transitionend', onTransitionEnd));
    }

    // привязываем слушатель И запускаем анимацию скрытия
    buttons.forEach(btn => btn.addEventListener('transitionend', onTransitionEnd));
    // небольшая задержка, чтобы гарантировано применился класс и началась анимация
    requestAnimationFrame(() => {
      buttons.forEach(btn => btn.classList.add('hidden-btn'));
    });

    // safety fallback — если transitionend не сработает, через 1.2s всё равно продолжим
    setTimeout(() => {
      if (finished < total) {
        cleanup();
        buttons.forEach(btn => btn.style.visibility = 'hidden');
        resolve();
      }
    }, 1400);
  });
}

function getLastRowInfo() {
  const btns = Array.from(buttonContainer.children);
  if (!btns.length) return 0;

  //debugOffsets();

  const lastTop = btns[btns.length - 1].offsetTop;
  const lastRowBtns = btns.filter(btn => btn.offsetTop === lastTop);

  console.log(`На последней строке: ${lastRowBtns.length}`);
  return lastRowBtns.length;
}

function checkLastRow() {
  // Максимум 3 попытки, чтобы не уйти в бесконечность
  for (let i = 0; i < 3; i++) {
    const n = getLastRowInfo();
    
    // Если в хвосте 1 или 2 кнопки — чистим
    if (n > 0 && n <= 2) {
      const closeButtons = Array.from(buttonContainer.querySelectorAll('button[data-state="close"]'))
        .filter(btn => btn.dataset.href !== '/space' && btn.dataset.href !== '/about');

      if (closeButtons.length === 0) break;

      closeButtons[closeButtons.length - 1].remove();
    } else {
      break;
    }
  }
}

function shuffleButtonsWithRules() {
  const container = buttonContainer;

  // слишком мало кнопок для перемешивания
  if (buttons.length <= 3) return; 

  // находим фиксированные
  const pre_a = buttons.find(b => b.dataset.href === "/space");
  const last = buttons.find(b => b.dataset.href === "/about");

  // кнопки, которые нельзя ставить последними перед фиксированными
  const excl = buttons.filter(b => b.dataset.href === "/wolume" || b.dataset.href === "/const");

  // остальные кнопки
  const rest = buttons.filter(b => ![last, pre_a].includes(b));

  // функция перемешивания Fisher–Yates
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
  }

  // перемешиваем, пока последний элемент локального массива не будет в excl
  let valid = false;
  while (!valid) {
    shuffle(rest);
    const lastRest = rest[rest.length - 1];
    valid = !excl.includes(lastRest);
  }

  container.innerHTML = "";

  rest.forEach(btn => container.appendChild(btn));

  // вставляем фиксированные в конец 
  container.appendChild(pre_a);
  container.appendChild(last); 
}

// Вызов при загрузке
adjustFontByCount();
shuffleButtonsWithRules();

if (isMobile) {
  removeBtnsOnMobile();
  removeOverflowingCloseButtons();
}else{
  
}

checkLastRow();


let isFull = false;      // Хранит состояние зоны (открыта/закрыта)
let isAnimating = false; // Блокирует спам-клики на 50мс

function changeZone(state = "open") {

  if (isAnimating) return; 
  isAnimating = true;

  const sprite = document.getElementById('heartIcon');
  const bContainer = document.getElementById('mButtonsContainer');
  
  const delayIcon = 50;
  const delayStyles = 0; 

  // Используем прямые команды вместо toggle
  setTimeout(() => {
    if (state === "open") {
      sprite.classList.add('is-full');
    } else {
      sprite.classList.remove('is-full');
    }
    isAnimating = false;
  }, delayIcon);

  // Стили меняем МГНОВЕННО (без setTimeout), чтобы не копить очередь событий
  const dButtons = Array.from(bContainer.querySelectorAll('button[data-z="D"]'))
    .filter(btn => btn.dataset.href !== '/space' && btn.dataset.href !== '/about');

  const wButtons = Array.from(bContainer.querySelectorAll('button[data-z="W"]'))
    .filter(btn => btn.dataset.href !== '/space' && btn.dataset.href !== '/about');

  if (state === "open") {
    setTimeout(() => {
      document.body.classList.add("switchZone");
      dButtons.forEach(b => { b.classList.add('dOpen');});
      wButtons.forEach(b => { b.classList.add('wLock');});

    }, delayStyles);
  
  } else {
    setTimeout(() => {
      document.body.classList.remove("switchZone");
      dButtons.forEach(b => b.classList.remove('dOpen'));
      wButtons.forEach(b => b.classList.remove('wLock'));
    }, delayStyles);
  
  }
}

buttons.forEach(btn => {
  btn.addEventListener('click', async (ev) => {
    
    const targetHref = btn.dataset.href;

    if (targetHref === "/about") {
        ev.preventDefault();
                
        isFull = !isFull;
        if (typeof changeZone === "function") changeZone(isFull ? "open" : "close");
        
        return;
    }

    // ЛОГИКА ДЛЯ CLOSE КНОПОК
    if (btn.dataset.state === 'close') {
      ev.preventDefault();
      return false;
    }

    // Для остальных кнопок
    let target = btn.dataset.href || '#';

    ev.preventDefault();
    buttonContainer.style.pointerEvents = 'none';
    await hideAllButtons();

    if (window.location.protocol === "file:") {
      // локальная отладка
      if (target.startsWith("/")) target = target.slice(1);
      target = target + ".html";
    } else {
      // сервер
      if (target.endsWith(".html")) {
        target = "/" + target.replace(".html", "");
      }
    }

    if (isMobile && btn.dataset.mobile === 'true') {
      target = "/ios" + target + "/";
    }
    if (isMobile) {
      target = target + "/";
    }
  
    window.location.href = target;

  });
});

function onKeyCommand(e) {

  console.log("Press", e.code);
  e.preventDefault();
  e.stopImmediatePropagation(); // Чтобы другие скрипты не мешали

  if (e.code === "Backquote") {
    if (window.location.protocol === "file:") {
      window.location.href = "./wolume/index.html";
    } else {
      window.location.href = "./wolume";
    }
  }

  if (e.code === 'KeyE') {
    if (window.location.protocol === "file:") {
      window.location.href = "./exegesis/index.html";
    } else {
      window.location.href = "./exegesis";
    }
  }

  if (e.code === 'KeyR') {
    if (window.location.protocol === "file:") {
      window.location.href = "./renders/index.html";
    } else {
      window.location.href = "./renders";
    }
  }

  if (e.code === 'KeyG') {
    if (window.location.protocol === "file:") {
      window.location.href = "./графика/index.html";
    } else {
      window.location.href = "./графика";
    }
  }

  if (e.code === 'KeyH') {
    if (window.location.protocol === "file:") {
      window.location.href = "./негативы/index.html";
    } else {
      window.location.href = "./негативы";
    }
  }

  return
}

document.addEventListener("keydown", onKeyCommand);

window.addEventListener('focus', () => {
    console.log("Фокус вернулся");
});


</script>
