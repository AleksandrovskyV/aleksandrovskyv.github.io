<link rel="apple-touch-icon" sizes="180x180" href="/content/fav/f_book.png">

<style>
  :root { --bg: #000; --ui: #000; --border: #222; --active: #fff; --accent: #ff8c00; }
  html,body { height:100%; margin:0; }
  body { background:var(--bg); color:#fff; font-family:system-ui, -apple-system, sans-serif; display:flex; align-items:center; justify-content:center; user-select:none; overflow:hidden; }
  #root { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering: pixelated; background:#000; display:block; margin: 25px}
  input[type=file] { display:none; }
</style>


</head>
<body>

<div id="root">
  <canvas id="BaseCanvas"></canvas>
</div>

<input id="fileInput" type="file" accept="application/json" />

<script>

// flipbook.. flippook...
// Type? Flip? Flip & Type !

// UserFlags
let debug = true;
let isPlaying = true;

//   Canvas UI primitives
const canvas = document.getElementById('BaseCanvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('fileInput');

// Frame Area setup : Default
const DEFAULTS_SETUP = {
    config: { rows: 7, cols: 10, size: 40 },
    states: [{ offsetX: 0, offsetY: 0, animStates: [{ activeCells: [], delay: 80 }] }]
};

// Frame Area setup : Preview on load page

let config = JSON.parse(JSON.stringify(DEFAULTS_SETUP.config));
let graphicStates = JSON.parse(JSON.stringify(DEFAULTS_SETUP.states));

let CELL   = config.size; // Размер ячейки
let CSIZEX = config.cols; // Размер поля X
let CSIZEY = debug ? config.rows + 1 : config.rows; // Размер поля Y

function playerUpdateSizeCanvas(canvas) {
  CSIZEX = config.cols;
  CSIZEY = debug ? config.rows + 1 : config.rows;

  const w = CSIZEX * CELL;
  const h = CSIZEY * CELL;

  canvas.width = w; canvas.height = h;
  canvas.style.width = `${w}px`;
  canvas.style.height = `${h}px`;
}

playerUpdateSizeCanvas(canvas);

// System Variables 
let _rafId = null;
let _loopPausedByVisibility = false;

let curGfx = 0, curAnim = 0, lastT = 0, fIdx = 0;



/* Generic Base classes on cell grid */

const POSITION_BASED = 1;

/* Special Wrappers */

class EditorArea {
  constructor(cellX, cellY) {
    this.S = CELL;
    this.cx = cellX-1; 
    this.cy = cellY-1;
    this.wc = config.cols;
    this.hc = config.rows;

    this.setSize(this.wc, this.hc);
  }

  update(x,y) {
    this.cx = x-1; 
    this.cy = y-1;
    this.wc = config.cols;
    this.hc = config.rows;

    this.setSize(this.wc, this.hc);
  }

  setSize(w,h) {
    this.x = this.cx * this.S;
    this.y = this.cy * this.S;
    this.w = w * this.S;
    this.h = h * this.S;
  }

  renderCellsAnimFromAnimStates(ctx){
    // draw cells current frame (clip) from userConfig 
    const gfx = graphicStates[curGfx];
    if (!gfx || !gfx.animStates[curAnim]) return;
    ctx.fillStyle = "#fff";
    gfx.animStates[curAnim].activeCells.forEach(key => {
      const [cx, cy] = key.split(',').map(Number); // these are 0-based in your data
      if (cx >= 0 && cx < this.wc && cy >= 0 && cy < this.hc) {
        ctx.fillRect(this.x + cx * this.S, this.y + cy * this.S, this.S, this.S);
      }
    });
  }

  render(ctx) {
    ctx.fillStyle = "#000";
    ctx.fillRect(this.x, this.y, this.w, this.h);


    // grid layout
    if(debug){

      ctx.strokeStyle = "#222";
      ctx.strokeRect(this.x + 0.5, this.y + 0.5, this.w - 1, this.h - 1);

      ctx.strokeStyle = "#222";
      for (let i = 0; i <= this.wc; i++) {
        ctx.beginPath();
        ctx.moveTo(this.x + i * this.S, this.y);
        ctx.lineTo(this.x + i * this.S, this.y + this.hc * this.S);
        ctx.stroke();
      }
      for (let j = 0; j <= this.hc; j++) {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + j * this.S);
        ctx.lineTo(this.x + this.wc * this.S, this.y + j * this.S);
        ctx.stroke();
      } 
    }

    this.renderCellsAnimFromAnimStates(ctx);

  }

}

//Build UI areas & buttons

let editorArea;

function playerRebuildLayou() {
  //// EditorArea:
  if(!editorArea){
    editorArea = new EditorArea(1, 1, true);
  }else{
    editorArea.update(1, 1);
  }
}

function playerRenderAll() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(debug){
    ctx.fillStyle = "#111"; // fill full bg
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#777"; // fill full bg
    ctx.font = Math.floor(CELL * 0.4) + "px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText("Press [L]oad config or [D]ebug turn...", CELL/2.2, canvas.height-(CELL/2.2) );

  }else{
    ctx.fillStyle = "#000"; // fill full bg
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  editorArea.render(ctx);

}

function buildUI() {
  playerRebuildLayou(); 
  playerRenderAll();
}

// ОСНОВНОЙ ЦИКЛ
function startLoop() {
  if (_rafId === null) _rafId = requestAnimationFrame(loop);
}
function stopLoop() {
  if (_rafId !== null) { cancelAnimationFrame(_rafId); _rafId = null; }
}  

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // при сворачивании — можно паузить анимацию или хотя бы уменьшить частоту
    _loopPausedByVisibility = true;
    // если хотите полностью стоп: stopLoop();
  } else {
    _loopPausedByVisibility = false;
    startLoop();
  }
});



/* Keyboard handling — reuse previous mapping */
function onKeyCommand(e) {
  const cod = e.code;
  if (cod === "KeyD"){
     debug=!debug ;
    playerUpdateSizeCanvas(canvas);
  }

  if(debug){
   if (cod === "KeyL") fileInput.click();    
  }else{

  }
}

window.addEventListener("keydown", onKeyCommand);

if(debug){

  fileInput.addEventListener('change', (ev)=>{
    const f = ev.target.files && ev.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      try {
        const data = JSON.parse(e.target.result);
        
        config = data.config; graphicStates = data.graphicStates;
        CELL = config.size;
        
        buildUI();

      } catch(err){ alert("Ошибка при чтении JSON файла"); }
    };
    reader.readAsText(f);
  });

}

function loop(t) {

  if (isPlaying) {
    const gfx = graphicStates[curGfx];
    if (gfx) {
      const anims = gfx.animStates;
      const currentDelay = anims[fIdx] ? anims[fIdx].delay : 80;
      let frameCount = anims.length; // Объявляем заранее

      if (t - lastT > currentDelay) {
        lastT = t;
        curAnim = fIdx;

        playerRenderAll();

        fIdx++;
        if (fIdx >= frameCount) { //anims.length
          fIdx = 0;
          curGfx = (curGfx + 1) % graphicStates.length;
          curAnim = 0;
        }
      }
    }
  }
  _rafId = requestAnimationFrame(loop);
  //requestAnimationFrame(loop);
}

function buildUIOnceAndStart() {
  buildUI();
  requestAnimationFrame(loop);
}

//   Initialize
buildUIOnceAndStart();

</script>
</body>
</html>
