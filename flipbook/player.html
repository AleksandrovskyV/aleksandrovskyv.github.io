<style>
  :root { --bg: #000; --cnvs: #000;  }
  html,body { height:100%; margin:0; }
  body { 
    background:var(--bg); 
    font-family:system-ui, -apple-system, sans-serif; 
    display:flex; align-items:center; justify-content:center; user-select:none; overflow:hidden; }
  #root { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering: pixelated; background:var(--cnvs); display:block; margin: 25px}
</style>

<body>

<div id="root">
  <canvas id="BaseCanvas"></canvas>
</div>

<script>

// flipbook.. flippook...
// Type? Flip? Flip & Type !

const canvas = document.getElementById('BaseCanvas');

// System Variables 
let _rafId = null;
let _loopPausedByVisibility = false;

/* Generic Base classes on cell grid */
const POSITION_BASED = 1; // not used on this implementation now

/* Special Wrappers */
class PlayerArea {
  constructor(pcanvas, pdebug, pconfig) {
    this.canvas = pcanvas;
    this.ctx = this.canvas.getContext('2d');
    this.debug = pdebug;

    this.isPlaying = true;
    this.useCustomDelay = false;
    this.customDelay = 120;

    this.curGfx = 0; this.curAnim = 0;
    this.lastT = 0; this.fIdx = 0;

    // Shear settings
    this.shearEnabled = false;
    this.shearAngle = -9; // degree
    this.shearAxis = 0; // 0=vertical 1=horizontal

    // Shear temp
    this._shearK = 0; // tan(angle)
    this._shearOffsetX = 0;
    this._shearOffsetY = 0;

    this.DEFAULTS_SETUP = {
        config: { rows: 7, cols: 10, size: 40 },
        states: [{ offsetX: 0, offsetY: 0, animStates: [{ activeCells: [], delay: this.customDelay }] }]
    };

    this.CURRENT_SETUP = pconfig ? pconfig : this.DEFAULTS_SETUP;

    this.config = JSON.parse(JSON.stringify(this.CURRENT_SETUP.config));
    this.graphicStates = JSON.parse(JSON.stringify(this.CURRENT_SETUP.states));

    this.updateConfig()
    this.initEvents();
  }

  // Единый метод для чтения файлов
  async parseFile(file) {
    if (!file) return;
    try {
      const text = await file.text();
      this.updateConfig(JSON.parse(text));
    } catch (err) { alert("Ошибка JSON"); }
  }

  async loadFile() {
    const jsonFilter = {
      description: 'JSON Config',
      accept: { 'application/json': ['.json'] }
    };

    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({ types: [jsonFilter] });
        this.parseFile(await handle.getFile());
      } catch (e) {} 
    } else {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json, application/json'; // Фильтр для старого способа
      input.onchange = () => this.parseFile(input.files[0]);
      input.click();
    }
  }

  initEvents() {
    // Клавиатура
    window.addEventListener("keydown", (e) => {
      if (e.code === "KeyD") { this.debug = !this.debug; this.updateCanvasSize(); }
      if (e.code === "KeyL" && this.debug) this.loadFile();
      if (e.code === "KeyH") { this.shearEnabled = !this.shearEnabled;     this.updateCanvasSize();};
      if (e.code === "KeyI") { this.shearAxis = this.shearAxis == 1 ? 0:1; this.updateCanvasSize();};
      if (e.code === "Space"){ this.isPlaying = !this.isPlaying; };
    });

    // Drag & Dro
    ['dragover', 'drop'].forEach(name => {
      this.canvas.addEventListener(name, (e) => {
        e.preventDefault();
        if (name === 'drop') this.parseFile(e.dataTransfer.files[0]);
      });
    });
  }

  updateConfig(data) {
    if(data){
      this.config = data.config; 
      this.graphicStates = data.graphicStates;   
    }

    this.w = this.config.cols * this.config.size;
    this.h = this.config.rows * this.config.size;
    
    this.shearOriginX = Math.round(this.w / 2);
    this.updateCanvasSize();
  }

  updateShearGeometry() {
    if (!this.shearEnabled || !this.shearAngle) {
      this._shearK = 0;
      this._shearOffsetX = 0; this._shearOffsetY = 0;
      this.shearedW = this.w; this.shearedH = this.h;
      return;
    }

    const angleRad = this.shearAngle * Math.PI / 180;
    this._shearK = Math.tan(angleRad);

    if (this.shearAxis == 0) { //vertical: y' = y + x*k
      const deltaY = Math.abs(this._shearK) * this.w;

      this.shearedW = this.w;
      this.shearedH = this.h + deltaY;

      this._shearOffsetY = this._shearK < 0 ? deltaY : 0;
      this._shearOffsetX = 0;

    } else { // horizontal: x' = x + y*k
      const deltaX = Math.abs(this._shearK) * this.h;

      this.shearedW = this.w + deltaX;
      this.shearedH = this.h;

      this._shearOffsetX = this._shearK < 0 ? deltaX : 0;
      this._shearOffsetY = 0;
    }
  }

  updateCanvasSize() {
    this.updateShearGeometry();
    const debugExtra = this.debug ? this.config.size : 0;

    const finalW = Math.ceil(this.shearedW);
    const finalH = Math.ceil(this.shearedH + debugExtra);

    this.canvas.width = finalW;
    this.canvas.height = finalH;
    this.canvas.style.width = finalW + "px";
    this.canvas.style.height = finalH + "px";

    this.redrawCanvas();
  }

  renderCellsFromConfig(){
    // draw cells current frame (clip) from userConfig 
    const gfx = this.graphicStates[this.curGfx];
    if (!gfx || !gfx.animStates[this.curAnim]) return;
    
    const color = "#fff";
    
    gfx.animStates[this.curAnim].activeCells.forEach(key => {
      const [cx, cy] = key.split(',').map(Number);
      if (cx >= 0 && cx < this.config.cols && cy >= 0 && cy < this.config.rows) {

        this.ctx.fillStyle = color;
        this.ctx.fillRect(cx * this.config.size, cy * this.config.size, this.config.size, this.config.size);
        
        if(this.shearEnabled){
          this.ctx.strokeStyle  = color;
          this.ctx.strokeRect(cx * this.config.size, cy * this.config.size, this.config.size, this.config.size);
        }
      }
    });
  }

  loopUpdate(t){
    if (this.isPlaying) {
      const gfx = this.graphicStates[this.curGfx];
      if (gfx) {
        const anims = gfx.animStates;
        const currentDelay = anims[this.fIdx] ? this.useCustomDelay?this.customDelay:anims[this.fIdx].delay : this.customDelay;
        let frameCount = anims.length; // Объявляем заранее

        if (t - this.lastT > currentDelay) {
          this.lastT = t;
          this.curAnim = this.fIdx;

          playerArea.redrawCanvas();

          this.fIdx++;
          if (this.fIdx >= frameCount) { //anims.length
            this.fIdx = 0;
            this.curGfx = (this.curGfx + 1) % this.graphicStates.length;
            this.curAnim = 0;
          }
        }
      }
    }
  }


 redrawCanvas() {
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);

    // Canvas Zone Fill (фон и подсказка / дебаг)
    if(this.debug){
      this.ctx.fillStyle = "#111"; // fill full bg
      this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);

      this.ctx.fillStyle = "#777"; // fill full bg
      this.ctx.font = Math.floor(this.config.size * 0.4) + "px sans-serif";
      this.ctx.textAlign = "left";
      this.ctx.textBaseline = "middle";
      this.ctx.fillText("[D]ebug, [L]oad (D&Drop), s[H]ear [I]nvert and [s__e]!", this.config.size/4, this.canvas.height-(this.config.size/2.2) );

    }else{
      this.ctx.fillStyle = "#000"; // fill full bg
      this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
    }

    // Area Zone Fill (внутри трансформированного пространства) с возможным shear
    this.ctx.save();

    if (this.shearEnabled && this._shearK !== 0) {
      this.ctx.translate(this._shearOffsetX, this._shearOffsetY);

      if (this.shearAxis == 0) { //vertical
        // y += x*k
        this.ctx.transform(1, this._shearK, 0, 1, 0, 0);
      } else {
        // x += y*k
        this.ctx.transform(1, 0, this._shearK, 1, 0, 0);
      }
    }

    this.ctx.fillStyle = "#000";
    this.ctx.fillRect(0, 0, this.w, this.h);

    // Guide Grid Cells (shear accept)
    if(this.debug){

      this.ctx.strokeStyle = "#222";
      this.ctx.lineWidth = 2;
      this.ctx.strokeRect(0, 0, this.w, this.h);

      this.ctx.lineWidth = 1;

      for (let i = 0; i <= this.config.cols; i++) {
        this.ctx.beginPath();
        this.ctx.moveTo(i * this.config.size, 0);
        this.ctx.lineTo(i * this.config.size, 0 + this.config.rows * this.config.size);
        this.ctx.stroke();
      }
      for (let j = 0; j <= this.config.rows; j++) {
        this.ctx.beginPath();
        this.ctx.moveTo(0, j * this.config.size);
        this.ctx.lineTo(this.config.cols * this.config.size, j * this.config.size);
        this.ctx.stroke();
      } 
    }

    // Render cells (подтянет трансформацию, квадраты станут параллелограммами)
    this.renderCellsFromConfig();

    this.ctx.restore();
  }

}

/* Create Instance */
let playerArea = new PlayerArea(canvas, true);


/* BASE LOOP */
function startLoop() {
  if (_rafId === null) _rafId = requestAnimationFrame(loop);
}
function stopLoop() {
  if (_rafId !== null) { cancelAnimationFrame(_rafId); _rafId = null; }
}  

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    _loopPausedByVisibility = true;
  } else {
    _loopPausedByVisibility = false;
    startLoop();
  }
});

function loop(t) {
  playerArea.loopUpdate(t);
  _rafId = requestAnimationFrame(loop);
  //requestAnimationFrame(loop);
}

function buildUIOnceAndStart() {
  playerArea.redrawCanvas();
  requestAnimationFrame(loop);
}

/* INIT */
buildUIOnceAndStart();

</script>
</body>
