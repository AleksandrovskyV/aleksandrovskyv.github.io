<style>
  :root { --bg: #000; --cnvs: #000;  }
  html,body { height:100%; margin:0; }
  body { 
    background:var(--bg); 
    font-family:system-ui, -apple-system, sans-serif; 
    display:flex; align-items:center; justify-content:center; user-select:none; overflow:hidden; }
  #root { width:100vw; height:100vh; display:flex; align-items:center; justify-content:center; }
  canvas { image-rendering: pixelated; background:var(--cnvs); display:block; margin: 25px}
  input[type=file] { display:none; }
</style>

</head>
<body>

<div id="root">
  <canvas id="BaseCanvas"></canvas>
</div>

<input id="fileInput" type="file" accept="application/json" />

<script>

// flipbook.. flippook...
// Type? Flip? Flip & Type !

//   Canvas UI primitives
const canvas = document.getElementById('BaseCanvas');
const fileInput = document.getElementById('fileInput');

const DEFAULTS_SETUP = {
    config: { rows: 7, cols: 10, size: 40 },
    states: [{ offsetX: 0, offsetY: 0, animStates: [{ activeCells: [], delay: 80 }] }]
};

let config = JSON.parse(JSON.stringify(DEFAULTS_SETUP.config));
let graphicStates = JSON.parse(JSON.stringify(DEFAULTS_SETUP.states));

// System Variables 
let _rafId = null;
let _loopPausedByVisibility = false;


/* Generic Base classes on cell grid */
const POSITION_BASED = 1;

/* Special Wrappers */
class PlayerArea {
  constructor(pcanvas, pdebug) {

    this.canvas = pcanvas;
    this.ctx = this.canvas.getContext('2d');
    this.debug = pdebug;

    this.isPlaying = true;

    this.useCustomDelay = true;
    this.customDelay = 300;

    this.curGfx = 0; this.curAnim = 0;
    this.lastT = 0; this.fIdx = 0;

    this.updateConfig()

  }

  updateConfig() {
    this.S = config.size ? config.size : 40;
    this.wc = config.cols;
    this.hc = config.rows;

    this.w = this.wc * this.S;
    this.h = this.hc * this.S;

    this.updateCanvasSize();
  }

  updateCanvasSize() {
    const w = this.wc * this.S;
    const h = (this.debug ? this.hc + 1 : this.hc) * this.S;

    this.canvas.width = w; 
    this.canvas.height = h;
    this.canvas.style.width = `${w}px`;
    this.canvas.style.height = `${h}px`;

    this.redrawCanvas();
  }

  onKey(cod) {
    if (cod === "KeyD"){
      this.debug=!this.debug;
      this.updateCanvasSize();
    }

    if(this.debug){
     if (cod === "KeyL") fileInput.click();    
    }
  }

  renderCellsFromConfig(){
    // draw cells current frame (clip) from userConfig 
    const gfx = graphicStates[this.curGfx];
    if (!gfx || !gfx.animStates[this.curAnim]) return;
    this.ctx.fillStyle = "#fff";
    gfx.animStates[this.curAnim].activeCells.forEach(key => {
      const [cx, cy] = key.split(',').map(Number); // these are 0-based in your data
      if (cx >= 0 && cx < this.wc && cy >= 0 && cy < this.hc) {
        this.ctx.fillRect(cx * this.S, cy * this.S, this.S, this.S);
      }
    });
  }

  loopUpdate(t){

    if (this.isPlaying) {
      const gfx = graphicStates[this.curGfx];
      if (gfx) {
        const anims = gfx.animStates;
        const currentDelay = anims[this.fIdx] ? this.useCustomDelay?this.customDelay:anims[this.fIdx].delay : this.customDelay;
        let frameCount = anims.length; // Объявляем заранее

        if (t - this.lastT > currentDelay) {
          this.lastT = t;
          this.curAnim = this.fIdx;

          playerArea.redrawCanvas();

          this.fIdx++;
          if (this.fIdx >= frameCount) { //anims.length
            this.fIdx = 0;
            this.curGfx = (this.curGfx + 1) % graphicStates.length;
            this.curAnim = 0;
          }
        }
      }
    }
  }


  redrawCanvas() {
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);

    // Canvas Zone
    if(this.debug){
      this.ctx.fillStyle = "#111"; // fill full bg
      this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);

      this.ctx.fillStyle = "#777"; // fill full bg
      this.ctx.font = Math.floor(this.S * 0.4) + "px sans-serif";
      this.ctx.textAlign = "left";
      this.ctx.textBaseline = "middle";
      this.ctx.fillText("Press [L]oad config or [D]ebug turn...", this.S/2.2, this.canvas.height-(this.S/2.2) );

    }else{
      this.ctx.fillStyle = "#000"; // fill full bg
      this.ctx.fillRect(0,0,this.canvas.width,this.canvas.height);
    }

    // Area Zone
    this.ctx.fillStyle = "#000";
    this.ctx.fillRect(0, 0, this.w, this.h);

    // grid layout
    if(this.debug){

      this.ctx.strokeStyle = "#222";
      this.ctx.strokeRect(0.5, 0.5, this.w - 1, this.h - 1);

      this.ctx.strokeStyle = "#222";

      for (let i = 0; i <= this.wc; i++) {
        this.ctx.beginPath();
        this.ctx.moveTo(i * this.S, 0);
        this.ctx.lineTo(i * this.S, 0 + this.hc * this.S);
        this.ctx.stroke();
      }
      for (let j = 0; j <= this.hc; j++) {
        this.ctx.beginPath();
        this.ctx.moveTo(0, j * this.S);
        this.ctx.lineTo(this.wc * this.S, j * this.S);
        this.ctx.stroke();
      } 
    }

    this.renderCellsFromConfig();

  }

}

/* Create Instance */

let playerArea = new PlayerArea(canvas, true);

/* KEYBOARD INPUT */

function onKeyCommand(e) {
  const cod = e.code;
  playerArea.onKey(cod);
}

window.addEventListener("keydown", onKeyCommand);

/* LOAD CONFIG LOGIC */
fileInput.addEventListener('change', (ev)=>{
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    try {
      const data = JSON.parse(e.target.result);

      config = data.config; 
      graphicStates = data.graphicStates;

      playerArea.updateConfig();

    } catch(err){ alert("Ошибка при чтении JSON файла"); }
  };
  reader.readAsText(f);
});

;


/* BASE LOOP */

function startLoop() {
  if (_rafId === null) _rafId = requestAnimationFrame(loop);
}
function stopLoop() {
  if (_rafId !== null) { cancelAnimationFrame(_rafId); _rafId = null; }
}  

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    _loopPausedByVisibility = true;
  } else {
    _loopPausedByVisibility = false;
    startLoop();
  }
});

function loop(t) {
  playerArea.loopUpdate(t);
  _rafId = requestAnimationFrame(loop);
  //requestAnimationFrame(loop);
}

function buildUIOnceAndStart() {
  playerArea.redrawCanvas();
  requestAnimationFrame(loop);
}

/* INIT */
buildUIOnceAndStart();

</script>
</body>
</html>
