let CELL   = config.size; // Размер ячейки
let CSIZEX = config.cols; // Размер поля X
let CSIZEY = debug ? config.rows +1 : config.rows; // Размер поля Y

function updateSizeCanvasPlayer(canvas) {
  CSIZEX = config.cols;
  CSIZEY = debug ? config.rows +1 : config.rows;

  const w = CSIZEX * CELL;
  const h = CSIZEY * CELL;

  canvas.width = w; canvas.height = h;
  canvas.style.width = `${w}px`;
  canvas.style.height = `${h}px`;
}

updateSizeCanvasPlayer(canvas);

// System Variables 
let _rafId = null;
let _loopPausedByVisibility = false;

let curGfx = 0, curAnim = 0, lastT = 0, fIdx = 0;
let isPlaying = true;


/* Generic Base classes on cell grid */

const POSITION_BASED = 1;



/* Special Wrappers */

class EditorArea {
  constructor(cellX, cellY, renderStates = false, wc, hc) {

    this.S = CELL;

    this.cx = cellX-1; 
    this.cy = cellY-1;
    
    this.renderStates = renderStates;
    // если renderStates == false здесь будем хранить список активных ячеек пользователем
    this.activeCells = renderStates ? null : new Set(); 

    this.wc = renderStates ? config.cols : wc;
    this.hc = renderStates ? config.rows : hc;

    this.setSize(this.wc, this.hc);

  }

  update(x,y,wc,hc) {
    this.cx = x-1; 
    this.cy = y-1;
    this.wc = this.renderStates ? config.cols : wc;
    this.hc = this.renderStates ? config.rows : hc;

    this.setSize(this.wc, this.hc);
  }

  setSize(w,h) {
    this.x = this.cx * this.S;
    this.y = this.cy * this.S;
    this.w = w * this.S;
    this.h = h * this.S;
  }

  contains(px, py) {
    return px >= this.x && py >= this.y && px < this.x + this.w && py < this.y + this.h;
  }

  getPosFromCanvas(px, py) {
    if (!this.contains(px, py)) return null;
    const localX = Math.floor((px - this.x) / this.S);
    const localY = Math.floor((py - this.y) / this.S);
    // clamp to [0..cols-1] / [0..rows-1]
    const cx = Math.max(0, Math.min(this.wc - 1, localX));
    const cy = Math.max(0, Math.min(this.hc - 1, localY));
    return { x: cx, y: cy };
  }

  renderCellsAnimFromAnimStates(ctx){
    // draw cells current frame (clip) from userConfig 
    const gfx = graphicStates[curGfx];
    if (!gfx || !gfx.animStates[curAnim]) return;
    ctx.fillStyle = "#fff";
    gfx.animStates[curAnim].activeCells.forEach(key => {
      const [cx, cy] = key.split(',').map(Number); // these are 0-based in your data
      if (cx >= 0 && cx < this.wc && cy >= 0 && cy < this.hc) {
        ctx.fillRect(this.x + cx * this.S, this.y + cy * this.S, this.S, this.S);
      }
    });
  }

  toggleCells(px, py) { //??? Этот метод должен добавить активную ячейку в activeCells
    const pos = this.getPosFromCanvas(px, py);
    if (!pos) return;
    const key = `${pos.x},${pos.y}`;
    if (this.activeCells.has(key)) {
        this.activeCells.delete(key);
    } else {
        this.activeCells.add(key);
    }
    if(patternSearch){
      patternSearch.setFramesPattern();
    }
    
  }

  getCells() {
    return this.activeCells;
  }

  renderCells(ctx) { //??? Этот метод должен отрендерить ячейки из activeCells
    if (!this.activeCells) return;

    ctx.fillStyle = "#fff"; // Или любой другой цвет для EditorAreaB
    this.activeCells.forEach(key => {
        const [cx, cy] = key.split(',').map(Number);
        ctx.fillRect(
            this.x + cx * this.S, 
            this.y + cy * this.S, 
            this.S, 
            this.S
        );
    });
  }

  render(ctx) {
    ctx.fillStyle = "#000";
    ctx.fillRect(this.x, this.y, this.w, this.h);
    ctx.strokeStyle = "#222";
    ctx.strokeRect(this.x + 0.5, this.y + 0.5, this.w - 1, this.h - 1);

    // grid layout
    ctx.strokeStyle = "#222";
    for (let i = 0; i <= this.wc; i++) {
      ctx.beginPath();
      ctx.moveTo(this.x + i * this.S, this.y);
      ctx.lineTo(this.x + i * this.S, this.y + this.hc * this.S);
      ctx.stroke();
    }
    for (let j = 0; j <= this.hc; j++) {
      ctx.beginPath();
      ctx.moveTo(this.x, this.y + j * this.S);
      ctx.lineTo(this.x + this.wc * this.S, this.y + j * this.S);
      ctx.stroke();
    }

    if(this.renderStates){
      this.renderCellsAnimFromAnimStates(ctx);
    }else{
      this.renderCells(ctx);
    }
  }
}

//Build UI areas & buttons

let editorArea;

function rebuildLayoutPlayer() {
  //// EditorArea:
  if(!editorArea){
    editorArea = new EditorArea(1, 1, true);
  }else{

function renderAllPlayer() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(debug){
    ctx.fillStyle = "#111"; // fill full bg
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#777"; // fill full bg
    ctx.font = Math.floor(CELL * 0.4) + "px sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText("Press [L] to load config", CELL/2.2, canvas.height-(CELL/2.2) );

  }else{
    ctx.fillStyle = "#000"; // fill full bg
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  editorArea.render(ctx);

}

function buildUI() {
  rebuildLayoutPlayer(); 
  renderAllPlayer();

// ОСНОВНОЙ ЦИКЛ
function startLoop() {
  if (_rafId === null) _rafId = requestAnimationFrame(loop);
}
function stopLoop() {
  if (_rafId !== null) { cancelAnimationFrame(_rafId); _rafId = null; }
}  

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    // при сворачивании — можно паузить анимацию или хотя бы уменьшить частоту
    _loopPausedByVisibility = true;
    // если хотите полностью стоп: stopLoop();
  } else {
    _loopPausedByVisibility = false;
    startLoop();
  }
});



/* Keyboard handling — reuse previous mapping */
function onKeyCommand(e) {
  const cod = e.code;
  if(debug){
   if (cod === "KeyL") fileInput.click();    
  }
}

window.addEventListener("keydown", onKeyCommand);

if(debug){

  fileInput.addEventListener('change', (ev)=>{
    const f = ev.target.files && ev.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      try {
        const data = JSON.parse(e.target.result);
        config = data.config; graphicStates = data.graphicStates;

        // синхронизируем глобальную «ячейковую» величину
        CELL = config.size;
        
        buildUI();

      } catch(err){ alert("Ошибка при чтении JSON файла"); }
    };
    reader.readAsText(f);
  });

}

function loop(t) {

  if (isPlaying) {
    const gfx = graphicStates[curGfx];
    if (gfx) {
      const anims = gfx.animStates;
      const currentDelay = anims[fIdx] ? anims[fIdx].delay : 80;
      let frameCount = anims.length; // Объявляем заранее


      if (t - lastT > currentDelay) {
        lastT = t;
        curAnim = fIdx;

        renderAllPlayer();

        fIdx++;
        if (fIdx >= frameCount) { //anims.length
          fIdx = 0;
          curGfx = (curGfx + 1) % graphicStates.length;
          curAnim = 0;
        }
      }
    }
  }
  _rafId = requestAnimationFrame(loop);
  //requestAnimationFrame(loop);
}

function buildUIOnceAndStart() {
  buildUI();
  requestAnimationFrame(loop);
}

//   Initialize
buildUIOnceAndStart();
